# not get tripped up by a relative-vs-absolute mismatch.
tss.wrapsProvingKeyPath=/opt/hgcapp/services-hedera/HapiApp2.0/data/keys/wraps-archive
tss.wrapsProvingKeyDownloadUrl=http://host.docker.internal:8089/wraps-v1.0.0.tar.gz
tss.wrapsProvingKeyDownloadEnabled=true
