# SPDX-License-Identifier: Apache-2.0
name: "819: [CALL] TCK Regression"
on:
  workflow_call:
    inputs:
      ref:
        description: "The branch, tag, or SHA to checkout:"
        required: false
        type: string
      custom-job-name:
        description: "The custom job name to use for the job:"
        required: false
        type: string
      solo-version:
        description: "The version of solo to install (if not specified, latest will be used):"
        required: false
        type: string
      java-version:
        description: "Java JDK Version:"
        type: string
        required: false
      java-distribution:
        description: "Java JDK Distribution:"
        type: string
        required: false
        default: "temurin"
      tck-version:
        description: "The version of the TCK to test against:"
        required: true
        type: string
      js-sdk-version:
        description: "The version of the JS-SDK to test against:"
        required: true
        type: string

    secrets:
      access-token:
        description: "GitHub Access Token with write permissions to the repository."
        required: true
      slack-tck-report-webhook:
        description: "Slack Webhook URL for TCK Group Monitoring."
        required: true
      slack-detailed-report-webhook:
        description: "Slack Webhook URL for TCK Monitoring."
        required: true
    outputs:
      failure-mode:
        description: "Failure Mode"
        value: ${{ jobs.tck-regression.outputs.failure-mode }}

defaults:
  run:
    shell: bash

permissions:
  checks: write
  contents: read
  actions: write
  statuses: write
  id-token: write

env:
  SOLO_CLUSTER_NAME: "solo-tck-e2e"
  SOLO_NAMESPACE: "solo-tck-e2e"
  SOLO_DEPLOYMENT: "solo-tck-deployment"
  SOLO_CLUSTER_SETUP_NAMESPACE: "solo-setup"
  GRADLE_EXEC: ionice -c 2 -n 2 nice -n 19 ./gradlew
  RUN_LOG_NAME: "run.tck-regression.log"

jobs:
  # Execute TCK Regression Tests using specified version of hiero-consensus-node
  tck-regression:
    name: ${{ inputs.custom-job-name || 'Standard' }}
    runs-on: hl-cn-sdk-tck-lin-lg
    outputs:
      failure-mode: ${{ steps.set-failure-mode.outputs.failure-mode }}
    steps:
      - name: Prepare Runner
        id: prepare-runner
        uses: pandaswhocode/initialize-github-job@c392c3e699995ab6030915302d2fc9bffb1e861f # v1.1.0
        with:
          checkout: "true"
          checkout-ref: "${{ inputs.ref || '' }}"
          checkout-token: "${{ secrets.GITHUB_TOKEN }}"
          checkout-fetch-depth: "0"
          setup-java: "true"
          java-version: "${{ inputs.java-version }}"

          java-distribution: "${{ inputs.java-distribution }}"

          setup-gradle: "true"
          gradle-cache-read-only: "false"
          setup-node: "true"
          node-version: "20.18.0"

      #  Checkout the sdk-tck repository and the TCK SDK Client
      - name: Checkout Regression Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          path: platform-sdk/regression
          repository: hiero-ledger/hiero-sdk-tck
          fetch-depth: 0
          fetch-tags: true

      - name: Checkout TCK Tag
        run: |
          cd platform-sdk/regression
          git fetch --tags

          # if ${{ inputs.tck-version }} is in the tags check it out.
          if git rev-parse "refs/tags/${{ inputs.tck-version }}" >/dev/null 2>&1; then
            echo "Checking out specified TCK version: ${{ inputs.tck-version }}"
            git checkout "tags/${{ inputs.tck-version }}"
          else
            echo "Specified TCK version ${{ inputs.tck-version }} not found in tags."
            exit 1 # fail the workflow if not present.
          fi

      # Checkout the JS-SDK server
      - name: Checkout JS-SDK Server
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          path: platform-sdk/sdk-server
          repository: hiero-ledger/hiero-sdk-js
          fetch-depth: 0
          fetch-tags: true

      - name: Checkout JS-SDK Tag
        run: |
          cd platform-sdk/sdk-server
          git fetch --tags

          # If ${{ inputs.js-sdk-version }} is in the tags, check it out.
          if git rev-parse "refs/tags/${{ inputs.js-sdk-version }}" >/dev/null 2>&1; then
            echo "Checking out specified JS-SDK version: ${{ inputs.js-sdk-version }}"
            git checkout "tags/${{ inputs.js-sdk-version }}"
          else
            echo "Specified JS-SDK version ${{ inputs.js-sdk-version }} not found in tags."
            exit 1 # fail the workflow if not present.
          fi

      - name: Setup PNPM
        run: |
          npm install -g pnpm

      # Build the hiero-consensus-node artifacts
      - name: Build hiero-consensus-node
        run: ${GRADLE_EXEC} assemble

      # Set up the npm dependencies and cache on the tck-client
      - name: Set up the tck-client
        run: |
          npm cache clean --force
          npm install
        working-directory: platform-sdk/regression

      # Set up the npm dependencies and cache on the sdk-server
      - name: Install NodeJS Dependencies (sdk-server)
        id: start-sdk-server
        run: |
          # Extract package versions from the parent package.json
          SDK_VERSION=$(node -e "console.log(require('../package.json').version)")
          LONG_VERSION=$(node -e "console.log(require('../package.json').dependencies.long)")
          PROTO_VERSION=$(node -e "console.log(require('../packages/proto/package.json').version)")

          echo "Using SDK version: ${SDK_VERSION}"
          echo "Using long version: ${LONG_VERSION}"
          echo "Using proto version: ${PROTO_VERSION}"

          # Install with the extracted versions
          pnpm add @hiero-ledger/sdk@^${SDK_VERSION} long@${LONG_VERSION} @hiero-ledger/proto@${PROTO_VERSION}
          pnpm install
          nohup pnpm start &
          server_pid=$!
          echo "pid=${server_pid}" >> "${GITHUB_OUTPUT}"
        working-directory: platform-sdk/sdk-server/tck

      # Prepare Hiero Solo
      - name: Prepare Hiero Solo
        id: solo-action
        timeout-minutes: 20
        uses: hiero-ledger/hiero-solo-action@8cda77e13916d1ed8f80eb07361a474a264be005 # latest on `main` currently
        with:
          installMirrorNode: true
          mirrorNodeVersion: v0.138.0
          soloVersion: ${{ inputs.solo-version || 'latest' }}

      # Start the TCK client
      - name: Start tck-client
        id: run-tck-tests
        env:
          OPERATOR_ACCOUNT_ID: "0.0.2"
          OPERATOR_ACCOUNT_PRIVATE_KEY: "302e020100300506032b65700422042091132178e72057a1d7528025956fe39b0b847f200ab59b2fdd367017f3087137"
          JSON_RPC_SERVER_URL: "http://127.0.0.1:8544"
          NODE_IP: "127.0.0.1:50211"
          MIRROR_NODE_REST_URL: "http://127.0.0.1:5551"
          MIRROR_NODE_REST_JAVA_URL: "http://127.0.0.1:8084"
          NODE_TIMEOUT: "30000"
          MIRROR_NETWORK: "127.0.0.1:5600"
          NODE_ACCOUNT_ID: "0.0.3"
        run: |
          version=$(solo --version | grep Version | awk '{print $3}')
          if [[ "$(printf '%s\n' "$version" "0.44.0" | sort -V | head -n1)" == "0.44.0" ]]; then
            solo ledger account create --dev --ed25519-private-key "${{ env.OPERATOR_ACCOUNT_PRIVATE_KEY }}" --deployment ${{ steps.solo-action.outputs.deployment }} --hbar-amount 1000000
          else
            solo account create --dev --ed25519-private-key "${{ env.OPERATOR_ACCOUNT_PRIVATE_KEY }}" --deployment ${{ steps.solo-action.outputs.deployment }} --hbar-amount 1000000
          fi
          cp .env.custom_node .env
          npm run test
        working-directory: platform-sdk/regression # required

      - name: SDK TCK Regression Test Report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: ${{ !cancelled() }}
        with:
          name: SDK TCK Regression Test Report
          path: "**/platform-sdk/regression/mochawesome-report/mochawesome.*"
          retention-days: 7

      # Collect run logs in a log file, ignore last job as it is the one that runs this workflow
      - name: Collect run logs in a log file
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.access-token }}
        run: |
          for job_id in $(gh run view ${{ github.run_id }} --json jobs --jq '.jobs | map(.databaseId) | .[0:-1] | .[]'); do
            echo "Fetching logs for job ${job_id}..."

            current_job_name=$(gh run view ${{ github.run_id }} --json jobs | jq --argjson job_id "${job_id}" -r '.jobs[] | select(.databaseId == $job_id) | .name')

            echo "Logs for job $current_job_name :" >> "${RUN_LOG_NAME}"

            gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            /repos/hiero-ledger/hiero-consensus-node/actions/jobs/"${job_id}"/logs >> "${RUN_LOG_NAME}"
          done

      - name: Upload log as artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        continue-on-error: true
        with:
          name: SDK TCK Run Logs
          path: ${{ env.RUN_LOG_NAME }}

      # Stop the TCK server
      - name: Stop tck-server
        if: ${{ always() }}
        run: |
          echo ${{ steps.start-sdk-server.outputs.pid }}
          kill -9 ${{ steps.start-sdk-server.outputs.pid }}

      - name: Set Failure Mode Output
        id: set-failure-mode
        if: ${{ always() }}
        working-directory: ${{ github.workspace }}
        env:
          INPUT_TEST_OUTCOMES: ${{ steps.run-tck-tests.outcome }}
          INPUT_WORKFLOW_OUTCOMES: ${{ steps.prepare-runner.outcome }}
        run: bash .github/workflows/support/scripts/set-failure-mode.sh

  report-tck-regression-status:
    name: ${{ inputs.custom-job-name || 'Standard' }} Slack Report
    runs-on: hl-cn-sdk-tck-lin-sm
    needs:
      - tck-regression
    if: ${{ always() }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout Templates
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          sparse-checkout: |
            .github/workflows/templates
          sparse-checkout-cone-mode: false

      - name: Install gomplate
        run: |
          curl -sSfL "https://github.com/hairyhenderson/gomplate/releases/download/v5.0.0/gomplate_linux-amd64" \
            -o /tmp/gomplate
          curl -sSfL "https://github.com/hairyhenderson/gomplate/releases/download/v5.0.0/checksums-v5.0.0_sha256.txt" \
            -o /tmp/gomplate_checksums.txt
          echo "$(grep 'bin/gomplate_linux-amd64$' /tmp/gomplate_checksums.txt | awk '{print $1}')  /tmp/gomplate" | sha256sum -c -
          sudo install -m 755 /tmp/gomplate /usr/local/bin/gomplate

      - name: Build Slack Payload Message
        id: payload
        env:
          HEADER_TEXT: ":vertical_traffic_light: Hiero Consensus Node - TCK Regression Test Report"
          STATUS_TEXT: "*TCK Regression Panel was executed. See status below.*"
          PANEL_LABEL: "TCK Regression Panel Result"
          RESULT: ${{ needs.tck-regression.result }}
          COMMIT_URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ inputs.ref }}
          WORKFLOW_RUN_ID: ${{ github.run_id }}
          WORKFLOW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          COLOR="#FF0000"
          if [[ "${{ needs.tck-regression.result }}" == "success" ]]; then
            COLOR="#00FF00"
          elif [[ "${{ needs.tck-regression.result }}" == "cancelled" ]]; then
            COLOR="#555555"
          fi
          export SLACK_COLOR="${COLOR}"
          gomplate -f .github/workflows/templates/slack-regression-report.json.tpl -o slack_payload.json

      - name: Report Status to CITR Detailed Test Results
        uses: slackapi/slack-github-action@b0fa283ad8fea605de13dc3f449259339835fc52 # v2.1.0
        with:
          webhook: ${{ secrets.slack-detailed-report-webhook }}
          webhook-type: incoming-webhook
          payload-templated: true
          payload-file-path: slack_payload.json
