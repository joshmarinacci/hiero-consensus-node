# SPDX-License-Identifier: Apache-2.0
name: "ZXF: [CITR] Adhoc - Single Day Performance Test Controller (SDPT)"
on:
  workflow_dispatch:
    inputs:
      ref:
        description: "The git ref (branch or tag) to checkout"
        required: false
        default: ""
      test-asset:
        required: true
        default: "AdHocSD9"
        description: "Performance test on machine: AdHoc5, 6, 7, AdHocSD8, 9"
        type: choice
        options:
          - AdHoc5
          - AdHoc6
          - AdHoc7
          - AdHoc13
          - AdHoc14
          - AdHocSD9
      nlg-accounts: #'-R -c 32 -a 100000000 -T 1000 -n 100000 -S hot -p 50 -tt 1m
        required: true
        default: "100000"
        description: "Number of Accounts and NFT tokens"
        type: choice
        options:
          - "100000"
          - "1000000"
          - "20000000"
          - "100000000"
          - "500000000"
          - "1000000000"
      nlg-time: #'-R -c 32 -a 100000000 -T 1000 -n 100000 -S hot -p 50 -tt 1m
        required: true
        default: "3"
        description: "Test execution time options"
        type: choice
        options:
          - "3"
          - "9"
          - "21"
          - "180"
          - "330"
      add-app-props:
        required: false
        default: ""
        type: string
        description: 'Add props to application.properties, e.g. "blockStream.streamMode=RECORDS". Newline is "\n"'
      add-settings:
        required: false
        default: ""
        type: string
        description: 'Add props to settings.txt, e.g. "state.saveStatePeriod, 300". Newline is "\n"'
      crypto-bench-merkle-db-java-args:
        required: true
        default: "-XX:+UseZGC -XX:+ZGenerational -XX:ZAllocationSpikeTolerance=2 -XX:ConcGCThreads=14 -XX:ZMarkStackSpaceLimit=12g -XX:MaxDirectMemorySize=24g -Xmx90g"
        description: "JMH javaargs"
        type: string
      crypto-bench-merkle-db-test-params:
        required: true
        default: "-p maxKey=500000000 -p numRecords=100000 -p keySize=24 -p recordSize=1024 -p numFiles=60"
        description: "Test params"
        type: string
      disable-notifications:
        required: false
        default: true
        type: boolean
        description: "If true, skip tag and notifications"
      delete-namespace:
        required: false
        default: true
        type: boolean
        description: "If true, automatically delete namespace when done"

defaults:
  run:
    shell: bash

permissions:
  contents: write
  id-token: write
  actions: write
  statuses: write

jobs:
  verify-tag:
    name: Verify Tag
    runs-on: hl-cn-sdpt-lin-sm
    continue-on-error: true
    outputs:
      build-number: ${{ steps.verify-tag.outputs.build-number }}
    steps:
      - name: Prepare Runner
        id: prepare-runner
        uses: pandaswhocode/initialize-github-job@c392c3e699995ab6030915302d2fc9bffb1e861f # v1.1.0
        with:
          checkout: "true"
          checkout-ref: "${{ inputs.ref || github.ref }}"
          checkout-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Verify Tag
        id: verify-tag
        env:
          PROMOTED_GREP_PATTERN: "build-(.{5})" # Pattern to match build tags (e.g., build-12345)
          CHECK_TAG: "${{ inputs.ref || github.ref }}"
        run: |
          # Ensure the tag that we received is a build tag
          # if the tag is a build tag then we can parse out the build number (the last 5 characters)
          # return the build tag as an output
          # if the tag is not a build tag then we will fail the workflow
          if [[ "${CHECK_TAG}" =~ ${PROMOTED_GREP_PATTERN} ]]; then
            echo "The tag is a valid build tag."
            BUILD_NUMBER="${BASH_REMATCH[1]}"
            echo "build-number=${BUILD_NUMBER}" >> "${GITHUB_OUTPUT}"

            echo "### Running SDPT" >> "${GITHUB_STEP_SUMMARY}"
            echo "Build number: ${BUILD_NUMBER}" >> "${GITHUB_STEP_SUMMARY}"
          else
            echo "::notice title=Invalid Build Tag::The provided tag (${CHECK_TAG}) is not a valid build tag."

            echo "### Running SDPT" >> "${GITHUB_STEP_SUMMARY}"
            echo "Ref: ${CHECK_TAG}" >> "${GITHUB_STEP_SUMMARY}"
          fi

  extract-jdk-version:
    name: Extract Java Version
    uses: ./.github/workflows/802-extract-jdk-version.yaml
    with:
      ref: ${{ inputs.ref || github.ref }}
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}

  run-single-day-performance-test:
    name: Performance Test
    needs:
      - verify-tag
      - extract-jdk-version
    uses: ./.github/workflows/zxc-single-day-performance-test.yaml
    if: ${{ needs.verify-tag.result == 'success' || inputs.disable-notifications == true }}
    with:
      test-asset: "${{ inputs.test-asset }}" # TODO: Once Chewie application is installed we can remove this input.
      ref: "${{ inputs.ref || github.ref }}"
      solo-version: "${{ vars.ADHOC_SOLO_VERSION }}"
      nlg-accounts: "${{ inputs.nlg-accounts }}"
      nlg-time: "${{ inputs.nlg-time }}"
      add-app-props: "${{ inputs.add-app-props }}"
      add-settings: "${{ inputs.add-settings }}"
      crypto-bench-merkle-db-java-args: "${{ inputs.crypto-bench-merkle-db-java-args }}"
      crypto-bench-merkle-db-test-params: "${{ inputs.crypto-bench-merkle-db-test-params }}"
      delete-namespace: ${{ inputs.delete-namespace }}
      java-version: "${{ needs.extract-jdk-version.outputs.jdk-version }}"
    secrets:
      slack-report-webhook: ${{ secrets.SLACK_CITR_DETAILED_REPORTS_WEBHOOK }}
      github-token: ${{ secrets.GITHUB_TOKEN }}

  tag-sdpt-result:
    name: Tag SDPT Result
    runs-on: hl-cn-sdpt-lin-sm
    needs:
      - run-single-day-performance-test
      - verify-tag
    if: ${{ inputs.disable-notifications != true }}
    steps:
      - name: Prepare Runner
        id: prepare-runner
        uses: pandaswhocode/initialize-github-job@c392c3e699995ab6030915302d2fc9bffb1e861f # v1.1.0
        with:
          checkout: "true"
          checkout-ref: "${{ inputs.ref || github.ref }}"
          checkout-token: "${{ secrets.GH_ACCESS_TOKEN }}"
          checkout-fetch-depth: "0"

      - name: Import GPG Key
        id: gpg_importer
        uses: step-security/ghaction-import-gpg@c86c374c0659a6c2d1284bccf8af889e73ce8fe0 # v6.3.0
        with:
          git_commit_gpgsign: true
          git_tag_gpgsign: true
          git_user_signingkey: true
          gpg_private_key: ${{ secrets.SVCS_GPG_KEY_CONTENTS }}
          passphrase: ${{ secrets.SVCS_GPG_KEY_PASSPHRASE }}

      - name: Tag SDPT Result
        run: |
          RESULT="${{ needs.run-single-day-performance-test.outputs.result }}"
          BUILD_NUM="${{ needs.verify-tag.outputs.build-number }}"

          # Skip tagging if no build number is found
          if [[ -z "${BUILD_NUM}" ]; then
            echo "No build number found. Skipping tagging step." >> "${GITHUB_STEP_SUMMARY}"
            exit 0
          fi

          # Populate the SDPT tag name and message
          if [[ "${RESULT}" == "success" ]]; then
            TAG_NAME="sdpt-pass-${BUILD_NUM}"
            MSG="Single Day Performance Test passed for build-${BUILD_NUM}"
          elif [[ "${RESULT}" == "failure" ]]; then
            TAG_NAME="sdpt-fail-${BUILD_NUM}"
            MSG="Single Day Performance Test FAILED for build-${BUILD_NUM}"
          else
            echo "No tag will be applied. Test result was: ${RESULT}" >> "${GITHUB_STEP_SUMMARY}"
            exit 0
          fi

          git tag --annotate "${TAG_NAME}" --message "${MSG}"
          git push --set-upstream origin --tags

          echo "### SDPT Result - Tag Information" >> "${GITHUB_STEP_SUMMARY}"
          echo "SDPT Tag: ${TAG_NAME}" >> "${GITHUB_STEP_SUMMARY}"

  get-commit-info:
    name: Get Commit Information
    runs-on: hl-cn-sdpt-lin-sm
    if: ${{ inputs.disable-notifications != true }}
    needs:
      - verify-tag
    outputs:
      commit-author: ${{ steps.find-commit-author-slack.outputs.commit-author }}
      commit-email: ${{ steps.find-commit-author-slack.outputs.commit-email }}
      slack-user-id: ${{ steps.find-commit-author-slack.outputs.slack-user-id }}
      commit: ${{ steps.find-commit-author-slack.outputs.commit }}
    steps:
      - name: Prepare Runner
        id: prepare-runner
        uses: pandaswhocode/initialize-github-job@c392c3e699995ab6030915302d2fc9bffb1e861f # v1.1.0
        with:
          checkout: "true"
          checkout-token: "${{ secrets.GH_ACCESS_TOKEN }}"
          checkout-fetch-depth: "0"

      - name: Find Commit Author in Slack
        id: find-commit-author-slack
        continue-on-error: true
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_CITR_BOT_TOKEN }}
        run: |
          # Extract the commit and user information from the build tag
          COMMIT=$(git rev-list -n 1 "${{ inputs.ref || github.ref }}")
          EMAIL=$(git log -1 --pretty=format:'%ae' "${COMMIT}")
          AUTHOR=$(git log -1 --pretty=format:'%an' "${COMMIT}")
          echo "commit=${COMMIT}" >> "${GITHUB_OUTPUT}"
          echo "commit-author=${AUTHOR}" >> "${GITHUB_OUTPUT}"
          echo "commit-email=${EMAIL}" >> "${GITHUB_OUTPUT}"
          bash "${{ github.workspace }}/.github/workflows/support/scripts/find-commit-author-slack.sh"
          echo "slack-user-id=${SLACK_USER_ID}" >> "${GITHUB_OUTPUT}"

  report-success:
    name: Report SDPT execution success
    runs-on: hl-cn-sdpt-lin-sm
    needs:
      - verify-tag
      - tag-sdpt-result
      - run-single-day-performance-test
      - get-commit-info
    if: ${{ (needs.verify-tag.result == 'success' &&
      needs.tag-sdpt-result.result == 'success' &&
      needs.run-single-day-performance-test.outputs.result == 'success' &&
      needs.get-commit-info.result == 'success') &&
      inputs.disable-notifications != true && !cancelled() }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout Templates
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          sparse-checkout: |
            .github/workflows/templates
          sparse-checkout-cone-mode: false

      - name: Install gomplate
        run: |
          curl -sSfL "https://github.com/hairyhenderson/gomplate/releases/download/v5.0.0/gomplate_linux-amd64" \
            -o /tmp/gomplate
          curl -sSfL "https://github.com/hairyhenderson/gomplate/releases/download/v5.0.0/checksums-v5.0.0_sha256.txt" \
            -o /tmp/gomplate_checksums.txt
          echo "$(grep 'bin/gomplate_linux-amd64$' /tmp/gomplate_checksums.txt | awk '{print $1}')  /tmp/gomplate" | sha256sum -c -
          sudo install -m 755 /tmp/gomplate /usr/local/bin/gomplate

      - name: Build Slack Payload Message
        id: payload
        env:
          HEADER_TEXT: ":tada: Hiero Consensus Node - Single Day Performance Test Passing Report"
          STATUS_TEXT: "*SDPT Job Succeeded. Test panel status below*"
          VERIFY_TAG_LABEL: "Verify Tag for SDPT"
          VERIFY_TAG_RESULT: ${{ needs.verify-tag.result }}
          RUN_TEST_LABEL: "Run Single Day Performance Test"
          RUN_TEST_RESULT: ${{ needs.run-single-day-performance-test.outputs.result }}
          TAG_LABEL: "Tag SDPT Passing"
          TAG_RESULT: ${{ needs.tag-sdpt-result.result }}
          SOURCE_TAG_URL: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ inputs.ref || github.ref }}
          COMMIT_AUTHOR: ${{ needs.get-commit-info.outputs.commit-author }}
          WORKFLOW_RUN_ID: ${{ github.run_id }}
          WORKFLOW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: gomplate -f .github/workflows/templates/slack-sdpt-sdlt-success.json.tpl -o slack_payload.json

      - name: Report Success (slack)
        uses: slackapi/slack-github-action@b0fa283ad8fea605de13dc3f449259339835fc52 # v2.1.0
        with:
          webhook: ${{ secrets.SLACK_CITR_OPERATIONS_WEBHOOK }}
          webhook-type: incoming-webhook
          payload-templated: true
          payload-file-path: slack_payload.json

  report-failure:
    name: Report SDPT execution failure
    runs-on: hl-cn-sdpt-lin-sm
    needs:
      - verify-tag
      - run-single-day-performance-test
      - tag-sdpt-result
      - get-commit-info
      - report-success
    if: ${{ (needs.verify-tag.result != 'success' ||
      needs.tag-sdpt-result.result != 'success' ||
      needs.run-single-day-performance-test.outputs.result != 'success' ||
      needs.get-commit-info.result != 'success' ||
      needs.report-success.result != 'success') &&
      inputs.disable-notifications != true && !cancelled() && always() }}

    steps:
      - name: Prepare Runner
        id: prepare-runner
        uses: pandaswhocode/initialize-github-job@c392c3e699995ab6030915302d2fc9bffb1e861f # v1.1.0
        with:
          checkout: "true"
          checkout-ref: "${{ inputs.ref || github.ref }}"
          checkout-token: "${{ secrets.GH_ACCESS_TOKEN }}"
          checkout-fetch-depth: "0"

      - name: Collect run logs in a log file
        env:
          GH_TOKEN: ${{ secrets.GH_ACCESS_TOKEN }}
        continue-on-error: true
        run: |
          for job_id in $(gh run view ${{ github.run_id }} --json jobs --jq '.jobs | map(.databaseId) | .[0:-1] | .[]'); do
            echo "Fetching logs for job $job_id..."

            current_job_name=$(gh run view ${{ github.run_id }} --json jobs | jq --argjson job_id "$job_id" -r '.jobs[] | select(.databaseId == $job_id) | .name')

            echo "Logs for job $current_job_name :" >> run.log

            gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            /repos/hiero-ledger/hiero-consensus-node/actions/jobs/$job_id/logs >> run.log
          done

      - name: Upload log as artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        continue-on-error: true
        with:
          path: run.log

      - name: Set Create-Alert Flag
        id: set-alert-flag
        run: |
          CREATE_ALERT="false"
          if [[ "${{ needs.verify-tag.result }}" =~ ^(cancelled|failure)$ ]] \
            || [[ "${{ needs.tag-sdpt-result.result }}" =~ ^(cancelled|failure)$ ]] \
            || [[ "${{ needs.get-commit-info.result }}" =~ ^(cancelled|failure)$ ]] \
            || [[ "${{ needs.report-success.result }}" =~ ^(cancelled|failure)$ ]]; then
            CREATE_ALERT="true"
          fi
          echo "create=${CREATE_ALERT}" >> "${GITHUB_OUTPUT}"

      - name: Build Rootly Summary
        id: rootly-summary
        run: |
          summary="The AdHoc SDPT Job Failed"
          echo "summary=${summary}" >> "${GITHUB_OUTPUT}"
          {
            echo 'details<<EOF'
            echo "------------------------------------"
            echo "Status of each job:"
            echo "- Verify Tag: ${{ needs.verify-tag.result }}"
            echo "- Run Single Day Performance Test: ${{ needs.run-single-day-performance-test.outputs.result }}"
            echo "- Tag SDPT Result: ${{ needs.tag-sdpt-result.result }}"
            echo "- Get Commit Info: ${{ needs.get-commit-info.result }}"
            echo "- Report Success: ${{ needs.report-success.result }}"
            echo "------------------------------------"
            echo "Commit information:"
            echo "- Commit: <${{ github.server_url }}/${{ github.repository }}/commit/${{ needs.get-commit-info.outputs.commit }}>"
            echo "- Workflow: <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}>"
            echo EOF
          } >> "${GITHUB_OUTPUT}"

      - name: Log Rootly Summary
        run: |
          echo "## Rootly Summary:"
          echo "### Summary: ${{ steps.rootly-summary.outputs.summary }}" >> "${GITHUB_STEP_SUMMARY}"
          echo "${{ steps.rootly-summary.outputs.details }}" >> "${GITHUB_STEP_SUMMARY}"

      - name: Create Rootly Alert
        if: ${{ steps.set-alert-flag.outputs.create == 'true' }}
        uses: pandaswhocode/rootly-alert-action@fdae1529e5aed62040016accf719a0ceb7dae57f # v1.0.0
        continue-on-error: true
        with:
          api_key: ${{ secrets.ROOTLY_API_TOKEN }}
          summary: ${{ steps.rootly-summary.outputs.summary }}
          details: ${{ steps.rootly-summary.outputs.details }}
          notification_target_type: "Service"
          notification_target: "CI/CD Workflows"
          set_as_noise: "false"
          alert_urgency: "Medium"
          environments: "CITR"
          external_id: ${{ github.run_id }}
          external_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Install gomplate
        run: |
          curl -sSfL "https://github.com/hairyhenderson/gomplate/releases/download/v5.0.0/gomplate_linux-amd64" \
            -o /tmp/gomplate
          curl -sSfL "https://github.com/hairyhenderson/gomplate/releases/download/v5.0.0/checksums-v5.0.0_sha256.txt" \
            -o /tmp/gomplate_checksums.txt
          echo "$(grep 'bin/gomplate_linux-amd64$' /tmp/gomplate_checksums.txt | awk '{print $1}')  /tmp/gomplate" | sha256sum -c -
          sudo install -m 755 /tmp/gomplate /usr/local/bin/gomplate

      - name: Build Slack Payload Message
        id: payload
        env:
          HEADER_TEXT: ":grey_exclamation: Hiero Consensus Node - Single Day Performance Test Error Report"
          STATUS_TEXT: "*SDPT Job Resulted in failure. See status below.*"
          VERIFY_TAG_LABEL: "Verify Tag for SDPT"
          VERIFY_TAG_RESULT: ${{ needs.verify-tag.result }}
          RUN_TEST_LABEL: "Run Single Day Performance Test"
          RUN_TEST_RESULT: ${{ needs.run-single-day-performance-test.outputs.result }}
          TAG_LABEL: "Tag SDPT Passing"
          TAG_RESULT: ${{ needs.tag-sdpt-result.result }}
          COMMIT_INFO_RESULT: ${{ needs.get-commit-info.result }}
          SOURCE_TAG_URL: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ inputs.ref || github.ref }}
          COMMIT_AUTHOR: ${{ needs.get-commit-info.outputs.commit-author }}
          SLACK_USER_ID: ${{ needs.get-commit-info.outputs.slack-user-id }}
          WORKFLOW_RUN_ID: ${{ github.run_id }}
          WORKFLOW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: gomplate -f .github/workflows/templates/slack-sdpt-sdlt-failure.json.tpl -o slack_payload.json

      - name: Report failure (slack citr-failures)
        uses: slackapi/slack-github-action@b0fa283ad8fea605de13dc3f449259339835fc52 # v2.1.0
        with:
          webhook: ${{ secrets.SLACK_CITR_FAILURES_WEBHOOK }}
          webhook-type: incoming-webhook
          payload-templated: true
          payload-file-path: slack_payload.json
