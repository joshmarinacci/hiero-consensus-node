# SPDX-License-Identifier: Apache-2.0
name: "[Release] Increment Version File"
on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Ref to run the workflow on:"
        required: true
        default: "main" # Default branch
      dry-run-enabled:
        description: "Perform Dry Run"
        type: boolean
        required: false
        default: false

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  extract-jdk-version:
    name: Extract Java Version
    uses: ./.github/workflows/802-extract-jdk-version.yaml
    with:
      ref: ${{ inputs.ref }}
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}

  next-main-release:
    name: Increment Version File
    needs:
      - extract-jdk-version
    runs-on: hl-cn-default-lin-sm
    steps:
      - name: Prepare Runner
        id: prepare-runner
        uses: pandaswhocode/initialize-github-job@c392c3e699995ab6030915302d2fc9bffb1e861f # v1.1.0
        with:
          checkout: "true"
          checkout-ref: "${{ inputs.ref }}"
          checkout-token: "${{ secrets.GH_ACCESS_TOKEN }}"
          checkout-fetch-depth: "0"
          setup-java: "true"
          java-version: "${{ needs.extract-jdk-version.outputs.jdk-version }}"
          java-distribution: "temurin"
          setup-gradle: "true"
          gradle-cache-disabled: "true"

      - name: Import GPG Key
        id: gpg_importer
        uses: step-security/ghaction-import-gpg@c86c374c0659a6c2d1284bccf8af889e73ce8fe0 # v6.3.0
        with:
          git_commit_gpgsign: true
          git_tag_gpgsign: true
          git_user_signingkey: true
          gpg_private_key: ${{ secrets.SVCS_GPG_KEY_CONTENTS }}
          passphrase: ${{ secrets.SVCS_GPG_KEY_PASSPHRASE }}

      - name: Install Semantic Version Tools
        id: install_semver
        run: |
          echo "::group::Download SemVer Binary"
          sudo curl -L -o /usr/local/bin/semver https://raw.githubusercontent.com/fsaintjacques/semver-tool/master/src/semver
          echo "::endgroup::"
          echo "::group::Change SemVer Binary Permissions"
          sudo chmod -v +x /usr/local/bin/semver
          echo "::endgroup::"
          echo "::group::Show SemVer Binary Version Info"
          semver --version
          echo "::endgroup::"

      - name: Read Current Version
        id: read_version
        run: |
          current_version="$(./gradlew -q showVersion)"
          echo "Current version: ${current_version}"
          echo "version=${current_version}" >> ${GITHUB_OUTPUT}
          printf "Current Version: ${current_version}" >> ${GITHUB_STEP_SUMMARY}

      - name: Increment Minor Version
        id: increment_version
        run: |
          # Strip the -SNAPSHOT suffix
          base_version="$(semver get release "${{ steps.read_version.outputs.version }}")"

          # Increment the minor version
          new_version="$(semver bump minor "${base_version}")"

          # Add the -SNAPSHOT suffix back
          new_version="${new_version}-SNAPSHOT"

          echo "New version: ${new_version}"
          echo "new-version=${new_version}" >> ${GITHUB_OUTPUT}
          printf "New Version: ${new_version}" >> ${GITHUB_STEP_SUMMARY}

      - name: Update Versions
        run: |
          ./gradlew versionAsSpecified -PnewVersion="${{ steps.increment_version.outputs.new-version }}"

      - name: Add & Commit
        if: ${{ inputs.dry-run-enabled == false }}
        uses: EndBug/add-and-commit@a94899bca583c204427a224a7af87c02f9b325d5 # v9.1.4
        with:
          cwd: "."
          author_name: ${{ secrets.SVCS_GIT_USER_NAME }}
          author_email: ${{ secrets.SVCS_GIT_USER_EMAIL }}
          commit: --signoff
          message: "chore: Minor Version Roll to ${{ steps.increment_version.outputs.new-version }}"
