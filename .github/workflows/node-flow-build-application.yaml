# SPDX-License-Identifier: Apache-2.0
name: "Node: Build Application"
on:
  push:
    branches:
      - main
      - "release/**"

defaults:
  run:
    shell: bash

permissions:
  id-token: write
  actions: read
  issues: write
  pull-requests: write
  statuses: write
  checks: write
  contents: read

jobs:
  extract-jdk-version:
    name: Extract Java Version
    uses: ./.github/workflows/802-extract-jdk-version.yaml
    with:
      ref: ${{ github.ref }}
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}

  mats-tests:
    name: MATS Tests
    uses: ./.github/workflows/zxc-mats-tests.yaml
    needs:
      - extract-jdk-version
    with:
      ref: ${{ github.ref }}
      enable-dependency-check: "true"
      enable-unit-tests: "true"
      enable-integration-tests: "true"
      enable-hapi-tests: "true"
      enable-hapi-tests-misc-records-crypto-and-serial: "true"
      enable-hapi-tests-token-and-time-consuming: "true"
      enable-hapi-tests-simple-fees-and-nd-reconnect: "true"
      enable-hapi-tests-atomic-batch: "true"
      enable-hapi-tests-smart-contract-and-iss: "true"
      enable-hapi-tests-state-throttling: "true"
      enable-otter-tests: "true"
      enable-snyk-scan: "true"
      enable-gradle-determinism: "true"
      enable-docker-determinism: "true"
      java-version: "${{ needs.extract-jdk-version.outputs.jdk-version }}"
      java-distribution: "temurin"
      custom-job-label: "MATS (main):"
    secrets:
      access-token: ${{ secrets.GITHUB_TOKEN }}
      codacy-project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
      codecov-token: ${{ secrets.CODECOV_TOKEN }}
      gradle-cache-username: ${{ secrets.GRADLE_CACHE_USERNAME }}
      gradle-cache-password: ${{ secrets.GRADLE_CACHE_PASSWORD }}
      snyk-token: ${{ secrets.SNYK_TOKEN }}

  deploy-ci-trigger:
    name: Trigger CI Flows
    runs-on: hl-cn-default-lin-sm
    needs:
      - mats-tests
    if: ${{ needs.mats-tests.result == 'success' && github.event.repository.visibility == 'public' }}
    steps:
      - name: Prepare Runner
        id: prepare-runner
        uses: pandaswhocode/initialize-github-job@c392c3e699995ab6030915302d2fc9bffb1e861f # v1.1.0
        with:
          checkout: "true"
          checkout-ref: ${{ github.sha }}
          checkout-token: ${{ secrets.GITHUB_TOKEN }}
          checkout-fetch-depth: "0"

      - name: Resolve Workflow Reference
        id: resolve-ref
        run: |
          RESOLVED_REF=${{ github.ref_name }}

          if ! git ls-remote --exit-code origin "${RESOLVED_REF}" &>/dev/null; then
            echo "::warning::Reference ${RESOLVED_REF} not found in remote. Defaulting to 'main'."
            RESOLVED_REF="main"
          fi

          echo "Using workflow reference: ${RESOLVED_REF}"
          echo "workflow-ref=${RESOLVED_REF}" >> "${GITHUB_OUTPUT}"

      - name: Trigger ZXF Deploy Production Release
        uses: step-security/workflow-dispatch@b4c1dc0afa074d0b4f0e653d3b80d4b2798599aa # v1.2.7
        with:
          workflow: .github/workflows/node-flow-deploy-release-artifact.yaml
          repo: hiero-ledger/hiero-consensus-node # ensure we are executing in the hiero-ledger org
          ref: ${{ steps.resolve-ref.outputs.workflow-ref }} # ensure we are always using the correct workflow definition. Default to main.
          token: ${{ secrets.GH_ACCESS_TOKEN }}
          inputs: '{
            "ref": "${{ github.sha }}",
            "ref-name": "${{ github.ref_name }}",
            "dry-run-enabled": false
            }'

  # Always run on the outcome (MATS failure, Deploy CI Trigger failure, or canceled)
  # so it can classify the result into a category and send the appropriate Slack notification.
  report-status:
    name: Report MATS execution status
    runs-on: hl-cn-default-lin-sm
    needs:
      - mats-tests
      - deploy-ci-trigger
    if: ${{ (needs.mats-tests.result != 'success' || needs.deploy-ci-trigger.result != 'success') && always() }}

    steps:
      - name: Prepare Runner
        id: prepare-runner
        uses: pandaswhocode/initialize-github-job@c392c3e699995ab6030915302d2fc9bffb1e861f # v1.1.0
        with:
          checkout: "true"
          checkout-ref: ${{ github.sha }}
          checkout-token: ${{ secrets.GH_ACCESS_TOKEN }}
          checkout-fetch-depth: "0"
          setup-gomplate: "true"

      - name: Collect run logs in a log file
        env:
          GH_TOKEN: ${{ secrets.GH_ACCESS_TOKEN }}
        continue-on-error: true
        run: |
          for job_id in $(gh run view ${{ github.run_id }} --json jobs --jq '.jobs | map(.databaseId) | .[0:-1] | .[]'); do
            echo "Fetching logs for job $job_id..."

            current_job_name=$(gh run view ${{ github.run_id }} --json jobs | jq --argjson job_id "$job_id" -r '.jobs[] | select(.databaseId == $job_id) | .name')

            echo "Logs for job $current_job_name :" >> run.log

            gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            /repos/hiero-ledger/hiero-consensus-node/actions/jobs/$job_id/logs >> run.log
          done

      - name: Upload log as artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        continue-on-error: true
        with:
          retention-days: 7
          path: |
            run.log

      # Classify the failure so each category gets a distinct Slack payload and
      # routing (e.g. test failures ping the commit author, environment issues
      # go to citr-failures). The "workflow" failure-mode is set by zxc-mats-tests
      # when a non-test step (spotless, module-info check, etc.) fails.
      - name: Determine Report Category
        id: report-category
        run: |
          if [[ "${{ needs.mats-tests.result }}" == "cancelled" ]]; then
            echo "category=cancelled" >> "${GITHUB_OUTPUT}"
          elif [[ "${{ needs.deploy-ci-trigger.result }}" =~ ^(cancelled|failure)$ ]] \
            || [[ "${{ needs.mats-tests.outputs.failure-mode }}" == "workflow" ]]; then
            echo "category=environment" >> "${GITHUB_OUTPUT}"
          else
            echo "category=test" >> "${GITHUB_OUTPUT}"
          fi

      - name: Get Commit Information
        id: fetch-commit-info
        run: |
          COMMIT_SHA="${{ github.sha }}"
          echo "commit-hash=${COMMIT_SHA}" >> "${GITHUB_OUTPUT}"
          echo "commit-author=$(git log -1 --pretty=format:'%an <%ae>' ${COMMIT_SHA})" >> "${GITHUB_OUTPUT}"
          echo "commit-email=$(git log -1 --pretty=format:'%ae' ${COMMIT_SHA})" >> "${GITHUB_OUTPUT}"

      # Only look up the Slack user for test failures (to tag the author) and
      # success. Environment failures aren't attributable to a specific commit.
      - name: Find Commit Author in Slack
        id: find-commit-author-slack
        if: ${{ steps.report-category.outputs.category == 'test' }}
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_CITR_BOT_TOKEN }}
          EMAIL: ${{ steps.fetch-commit-info.outputs.commit-email }}
        continue-on-error: true
        run: |
          bash "${{ github.workspace }}/.github/workflows/support/scripts/find-commit-author-slack.sh"
          echo "slack-user-id=${SLACK_USER_ID}" >> "${GITHUB_OUTPUT}"

      - name: Set Rootly Parameters
        id: set-rootly-parameters
        if: ${{ steps.report-category.outputs.category == 'test' || steps.report-category.outputs.category == 'environment' }}
        run: |
          ROOTLY_SERVICE_NAME="CITR General"
          if [[ "${{ steps.report-category.outputs.category }}" == "environment" ]]; then
            ROOTLY_SERVICE_NAME="CI/CD Workflows"
          fi
          echo "service=${ROOTLY_SERVICE_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Build Rootly Summary
        id: rootly-summary
        if: ${{ steps.report-category.outputs.category == 'test' || steps.report-category.outputs.category == 'environment' }}
        env:
          PRINT_FAILED_TESTS_SCRIPT: ".github/workflows/support/scripts/print-failed-tests.sh"
        run: |
          title="MATS Error Report"

          echo "title=${title}" >> "${GITHUB_OUTPUT}"
          {
            echo 'summary<<EOF'
            echo "------------------------------------"
            echo "Status of each jobs:"
            echo "- MATS Tests: ${{ needs.mats-tests.result }}"
            echo "- Deploy CI Triggers: ${{ needs.deploy-ci-trigger.result }}"
            echo "------------------------------------"
            if [[ "${{ needs.mats-tests.result }}" != "success" ]]; then
              echo "MATS tests failed due to a ${{ needs.mats-tests.outputs.failure-mode }} error."
              echo "- Failing Test(s):"
              bash "${{ github.workspace }}/${{ env.PRINT_FAILED_TESTS_SCRIPT }}" "${{ needs.mats-tests.outputs.failed-tests }}"
              echo "------------------------------------"
            fi
            echo "Commit information:"
            echo "- Author: ${{ steps.find-commit-author-slack.outputs.slack-user-id }}"
            echo "- Commit: <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}>"
            echo "- Workflow: <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}>"
            echo EOF
          } >> "${GITHUB_OUTPUT}"

      - name: Log Rootly Summary
        if: ${{ steps.report-category.outputs.category == 'test' || steps.report-category.outputs.category == 'environment' }}
        run: |
          echo "## Rootly Summary:"
          echo "### Title: ${{ steps.rootly-summary.outputs.title }}" >> "${GITHUB_STEP_SUMMARY}"
          echo "${{ steps.rootly-summary.outputs.summary }}" >> "${GITHUB_STEP_SUMMARY}"
          echo "### Rootly Service" >> "${GITHUB_STEP_SUMMARY}"
          echo "${{ steps.set-rootly-parameters.outputs.service }}" >> "${GITHUB_STEP_SUMMARY}"

      - name: Create Rootly Alert
        id: create-rootly-alert
        if: ${{ steps.report-category.outputs.category == 'test' || steps.report-category.outputs.category == 'environment' }}
        uses: pandaswhocode/rootly-alert-action@25cfdb8b2c006c1b130c183c7b1cbcffafb71f39 # v1.0.10
        continue-on-error: true
        with:
          api_key: ${{ secrets.ROOTLY_API_TOKEN }}
          summary: "${{ steps.rootly-summary.outputs.title }}"
          details: "${{ steps.rootly-summary.outputs.summary }}"
          notification_target_type: "Service"
          notification_target: ${{ steps.set-rootly-parameters.outputs.service }}
          set_as_noise: "false"
          alert_urgency: "High"
          external_id: ${{ github.run_id }}
          external_url: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          environments: "CITR"

      - name: Build Test Failure Slack Payload
        if: ${{ steps.report-category.outputs.category == 'test' }}
        env:
          MATS_TESTS_RESULT: ${{ needs.mats-tests.result }}
          DEPLOY_CI_TRIGGER_RESULT: ${{ needs.deploy-ci-trigger.result }}
          FAILED_TESTS: ${{ needs.mats-tests.outputs.failed-tests }}
          COMMIT_URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ steps.fetch-commit-info.outputs.commit-hash }}
          COMMIT_AUTHOR: ${{ steps.fetch-commit-info.outputs.commit-author }}
          SLACK_USER_ID: ${{ steps.find-commit-author-slack.outputs.slack-user-id }}
          WORKFLOW_RUN_ID: ${{ github.run_id }}
          WORKFLOW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: gomplate -f .github/workflows/templates/slack-mats-test-failure-detailed.json.tpl -o slack_payload.json

      - name: Build Environment Failure Slack Payload
        if: ${{ steps.report-category.outputs.category == 'environment' }}
        env:
          MATS_TESTS_RESULT: ${{ needs.mats-tests.result }}
          DEPLOY_CI_TRIGGER_RESULT: ${{ needs.deploy-ci-trigger.result }}
          WORKFLOW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: gomplate -f .github/workflows/templates/slack-mats-env-failure-detailed.json.tpl -o slack_payload.json

      - name: Build Environment Failure Summary Payload
        if: ${{ steps.report-category.outputs.category == 'environment' }}
        env:
          SLACK_SUMMARY_TEXT: ":warning: MATS environment failure on `main` — <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
        run: gomplate -f .github/workflows/templates/slack-env-failure-summary.json.tpl -o slack_payload_summary.json

      - name: Build Cancelled Summary Payload
        if: ${{ steps.report-category.outputs.category == 'cancelled' }}
        env:
          SLACK_SUMMARY_TEXT: ":no_entry_sign: MATS run cancelled on `main` — <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
        run: gomplate -f .github/workflows/templates/slack-cancelled-summary.json.tpl -o slack_payload_summary.json

      # Notification routing:
      #   test failures       -> citr-operations (detailed)
      #   environment      -> citr-operations (summary) + citr-failures (detailed)
      #   canceled            -> citr-operations (summary) + citr-failures (summary)
      - name: Notify test failure detailed (citr-operations)
        if: ${{ steps.report-category.outputs.category == 'test' }}
        uses: slackapi/slack-github-action@b0fa283ad8fea605de13dc3f449259339835fc52 # v2.1.0
        with:
          webhook: ${{ secrets.SLACK_CITR_OPERATIONS_WEBHOOK }}
          webhook-type: incoming-webhook
          payload-templated: true
          payload-file-path: slack_payload.json

      - name: Notify environment failure summary (citr-operations)
        if: ${{ steps.report-category.outputs.category == 'environment' }}
        uses: slackapi/slack-github-action@b0fa283ad8fea605de13dc3f449259339835fc52 # v2.1.0
        with:
          webhook: ${{ secrets.SLACK_CITR_OPERATIONS_WEBHOOK }}
          webhook-type: incoming-webhook
          payload-templated: true
          payload-file-path: slack_payload_summary.json

      - name: Notify environment failure detailed (citr-failures)
        if: ${{ steps.report-category.outputs.category == 'environment' }}
        uses: slackapi/slack-github-action@b0fa283ad8fea605de13dc3f449259339835fc52 # v2.1.0
        with:
          webhook: ${{ secrets.SLACK_CITR_FAILURES_WEBHOOK }}
          webhook-type: incoming-webhook
          payload-templated: true
          payload-file-path: slack_payload.json

      - name: Notify cancelled summary (citr-operations)
        if: ${{ steps.report-category.outputs.category == 'cancelled' }}
        uses: slackapi/slack-github-action@b0fa283ad8fea605de13dc3f449259339835fc52 # v2.1.0
        with:
          webhook: ${{ secrets.SLACK_CITR_OPERATIONS_WEBHOOK }}
          webhook-type: incoming-webhook
          payload-templated: true
          payload-file-path: slack_payload_summary.json

      - name: Notify cancelled summary (citr-failures)
        if: ${{ steps.report-category.outputs.category == 'cancelled' }}
        uses: slackapi/slack-github-action@b0fa283ad8fea605de13dc3f449259339835fc52 # v2.1.0
        with:
          webhook: ${{ secrets.SLACK_CITR_FAILURES_WEBHOOK }}
          webhook-type: incoming-webhook
          payload-templated: true
          payload-file-path: slack_payload_summary.json
