# SPDX-License-Identifier: Apache-2.0
name: "ZXC: Executable MATS Tests"
on:
  workflow_call:
    inputs:
      ref:
        description: "Git Reference to Test"
        type: string
        required: false
        default: ""
      enable-dependency-check:
        description: "Dependency Check Enabled"
        type: string
        required: false
        default: "false"
      enable-unit-tests:
        description: "Unit Testing Enabled"
        type: string
        required: false
        default: "false"
      enable-integration-tests:
        description: "Integration Testing Enabled"
        type: string
        required: false
        default: "false"
      enable-hapi-tests:
        description: "HAPI Testing Enabled"
        type: string
        required: false
        default: "false"
      enable-hapi-tests-misc-records-crypto-and-serial:
        description: "HAPI Testing (Misc Records, Crypto & Misc Serial) Enabled"
        type: string
        required: false
        default: "false"
      enable-hapi-tests-token-and-time-consuming:
        description: "HAPI Testing (Token & Time Consuming) Enabled"
        type: string
        required: false
        default: "false"
      enable-hapi-tests-simple-fees-and-nd-reconnect:
        description: "HAPI Testing (Simple Fees & ND Reconnect) Enabled"
        type: string
        required: false
        default: "false"
      enable-hapi-tests-atomic-batch:
        description: "HAPI Testing (Atomic Batch) Enabled"
        type: string
        required: false
        default: "false"
      enable-hapi-tests-smart-contract-and-iss:
        description: "HAPI Testing (Smart Contracts & ISS) Enabled"
        type: string
        required: false
        default: "false"
      enable-hapi-tests-state-throttling:
        description: "HAPI Testing (State Throttling) Enabled"
        type: string
        required: false
        default: "false"
      enable-otter-tests:
        description: "Otter Tests Enabled"
        type: string
        required: false
        default: "false"
      enable-snyk-scan:
        description: "Snyk Scan Enabled"
        type: string
        required: false
        default: "false"
      enable-gradle-determinism:
        description: "Gradle Build Determinism Check Enabled"
        type: string
        required: false
        default: "false"
      enable-docker-determinism:
        description: "Docker Build Determinism Check Enabled"
        type: string
        required: false
        default: "false"
      java-version:
        description: "Java JDK Version"
        type: string
        required: false
      java-distribution:
        description: "Java JDK Distribution"
        type: string
        required: false
        default: "temurin"
      custom-job-label:
        description: "Custom Job Label"
        type: string
        required: false
        default: "MATS Tests"
    secrets:
      access-token:
        description: "Github Access Token"
        required: false
      codacy-project-token:
        description: "Codacy Project Token"
        required: false
      codecov-token:
        description: "Codecov Token"
        required: false
      gradle-cache-username:
        description: "Gradle Cache Username"
        required: true
      gradle-cache-password:
        description: "Gradle Cache Password"
        required: true
      snyk-token:
        required: false
    outputs:
      failure-mode:
        description: "Failure Mode"
        value: ${{ jobs.set-failure-mode.outputs.failure-mode }}
      failed-tests:
        description: "List of failed Tests"
        value: ${{ jobs.set-failure-mode.outputs.failed-tests }}

permissions:
  id-token: write
  actions: read
  pull-requests: write
  statuses: write
  checks: write
  contents: read

defaults:
  run:
    shell: bash

jobs:
  commit-info:
    name: Get Commit Info
    runs-on: hl-cn-default-lin-sm
    outputs:
      sha: ${{ steps.commit-info.outputs.sha }}
    steps:
      - name: Prepare Runner
        id: prepare-runner
        uses: pandaswhocode/initialize-github-job@c392c3e699995ab6030915302d2fc9bffb1e861f # v1.1.0
        with:
          checkout: "true"
          checkout-ref: "${{ inputs.ref }}"
          checkout-fetch-depth: "1"
          checkout-token: "${{ secrets.access-token }}"

      - name: Get Commit Info
        id: commit-info
        run: |
          COMMIT_SHA=$(git rev-parse HEAD)
          echo "sha=${COMMIT_SHA}" | tee "${GITHUB_OUTPUT}"

  compile-and-spotless:
    name: "${{ inputs.custom-job-label }} Compile and Spotless"
    uses: ./.github/workflows/zxc-compile-and-spotless-check.yaml
    needs:
      - commit-info
    with:
      ref: "${{ needs.commit-info.outputs.sha }}"
      java-version: "${{ inputs.java-version }}"
      java-distribution: "${{ inputs.java-distribution }}"
    secrets:
      access-token: ${{ secrets.access-token }}
      gradle-cache-username: ${{ secrets.gradle-cache-username }}
      gradle-cache-password: ${{ secrets.gradle-cache-password }}

  dependency-check:
    name: "${{ inputs.custom-job-label }} Dependency (Module Info)"
    if: ${{ inputs.enable-dependency-check == 'true' }}
    uses: ./.github/workflows/zxc-dependency-module-check.yaml
    needs:
      - commit-info
      - compile-and-spotless
    with:
      ref: ${{ needs.commit-info.outputs.sha }}
      java-version: "${{ inputs.java-version }}"
    secrets:
      access-token: ${{ secrets.access-token }}
      gradle-cache-username: ${{ secrets.gradle-cache-username }}
      gradle-cache-password: ${{ secrets.gradle-cache-password }}

  mats-unit-tests:
    name: Unit Tests
    if: ${{ inputs.enable-unit-tests == 'true' }}
    uses: ./.github/workflows/zxc-execute-unit-tests.yaml
    needs:
      - commit-info
      - compile-and-spotless
    with:
      ref: ${{ needs.commit-info.outputs.sha || '' }}
      java-version: "${{ inputs.java-version }}"
      java-distribution: "${{ inputs.java-distribution }}"
    secrets:
      access-token: ${{ secrets.access-token }}
      gradle-cache-username: ${{ secrets.gradle-cache-username }}
      gradle-cache-password: ${{ secrets.gradle-cache-password }}
      codacy-project-token: ${{ secrets.codacy-project-token }}
      codecov-token: ${{ secrets.codecov-token }}

  mats-integration-tests:
    name: Integration Tests
    if: ${{ inputs.enable-integration-tests == 'true' }}
    uses: ./.github/workflows/zxc-execute-integration-tests.yaml
    needs:
      - commit-info
      - compile-and-spotless
    with:
      ref: ${{ needs.commit-info.outputs.sha || '' }}
      java-version: "${{ inputs.java-version }}"
      java-distribution: "${{ inputs.java-distribution }}"
      enable-network-log-capture: "true"
    secrets:
      access-token: ${{ secrets.access-token }}
      gradle-cache-username: ${{ secrets.gradle-cache-username }}
      gradle-cache-password: ${{ secrets.gradle-cache-password }}

  mats-hapi-tests:
    name: HAPI Tests
    if: ${{ inputs.enable-hapi-tests == 'true' }}
    uses: ./.github/workflows/zxc-execute-hapi-tests.yaml
    needs:
      - commit-info
      - compile-and-spotless
    with:
      ref: ${{ needs.commit-info.outputs.sha || '' }}
      java-version: "${{ inputs.java-version }}"
      java-distribution: "${{ inputs.java-distribution }}"
      enable-hapi-tests-misc: "${{ inputs.enable-hapi-tests == 'true' }}"
      enable-hapi-tests-misc-records-crypto-and-serial: "${{ inputs.enable-hapi-tests == 'true' || inputs.enable-hapi-tests-misc-records-crypto-and-serial == 'true' }}"
      enable-hapi-tests-token-and-time-consuming: "${{ inputs.enable-hapi-tests == 'true' || inputs.enable-hapi-tests-token-and-time-consuming == 'true' }}"
      enable-hapi-tests-simple-fees-and-nd-reconnect: "${{ inputs.enable-hapi-tests == 'true' || inputs.enable-hapi-tests-simple-fees-and-nd-reconnect == 'true' }}"
      enable-hapi-tests-atomic-batch: "${{ inputs.enable-hapi-tests == 'true' || inputs.enable-hapi-tests-atomic-batch == 'true' }}"
      enable-hapi-tests-smart-contract-and-iss: "${{ inputs.enable-hapi-tests == 'true' || inputs.enable-hapi-tests-smart-contract-and-iss == 'true' }}"
      enable-hapi-tests-restart: "${{ inputs.enable-hapi-tests == 'true' }}"
      enable-hapi-tests-state-throttling: "${{ inputs.enable-hapi-tests-state-throttling == 'true' }}"
      enable-network-log-capture: "true"
    secrets:
      access-token: ${{ secrets.access-token }}
      gradle-cache-username: ${{ secrets.gradle-cache-username }}
      gradle-cache-password: ${{ secrets.gradle-cache-password }}

  mats-otter-tests:
    name: Otter Tests
    if: ${{ inputs.enable-otter-tests == 'true' }}
    needs:
      - commit-info
      - compile-and-spotless
    uses: ./.github/workflows/zxc-execute-otter-tests.yaml
    with:
      ref: ${{ needs.commit-info.outputs.sha || '' }}
      java-version: "${{ inputs.java-version }}"
      java-distribution: "${{ inputs.java-distribution }}"
      enable-fast-otter-tests: ${{ inputs.enable-otter-tests == 'true' }}
      enable-network-log-capture: true
    secrets:
      access-token: ${{ secrets.access-token }}
      gradle-cache-username: ${{ secrets.gradle-cache-username }}
      gradle-cache-password: ${{ secrets.gradle-cache-password }}

  mats-snyk-scan:
    name: Snyk Scan
    if: ${{ inputs.enable-snyk-scan == 'true' && !github.event.workflow_call.repository.fork }}
    needs:
      - commit-info
      - compile-and-spotless
    uses: ./.github/workflows/zxc-snyk-scan.yaml
    with:
      ref: ${{ needs.commit-info.outputs.sha || '' }}
      java-version: "${{ inputs.java-version }}"
      java-distribution: "${{ inputs.java-distribution }}"
    secrets:
      access-token: ${{ secrets.access-token }}
      gradle-cache-username: ${{ secrets.gradle-cache-username }}
      gradle-cache-password: ${{ secrets.gradle-cache-password }}
      snyk-token: ${{ secrets.snyk-token }}

  mats-gradle-determinism:
    name: Gradle Determinism
    if: ${{ inputs.enable-gradle-determinism == 'true' && !github.event.workflow_call.repository.fork }}
    needs:
      - commit-info
      - compile-and-spotless
    uses: ./.github/workflows/zxc-verify-gradle-build-determinism.yaml
    with:
      ref: ${{ needs.commit-info.outputs.sha || '' }}
      java-version: "${{ inputs.java-version }}"
      java-distribution: "${{ inputs.java-distribution }}"
    secrets:
      github-token: ${{ secrets.access-token }}
      gradle-cache-username: ${{ secrets.gradle-cache-username }}
      gradle-cache-password: ${{ secrets.gradle-cache-password }}

  mats-docker-determinism:
    name: Docker Determinism
    if: ${{ inputs.enable-docker-determinism == 'true' && !github.event.workflow_call.repository.fork }}
    needs:
      - commit-info
      - compile-and-spotless
    uses: ./.github/workflows/zxc-verify-docker-build-determinism.yaml
    with:
      ref: ${{ needs.commit-info.outputs.sha || '' }}
      java-version: "${{ inputs.java-version }}"
      java-distribution: "${{ inputs.java-distribution }}"
    secrets:
      github-token: ${{ secrets.access-token }}
      gradle-cache-username: ${{ secrets.gradle-cache-username }}
      gradle-cache-password: ${{ secrets.gradle-cache-password }}

  set-failure-mode:
    name: Set Failure Mode
    runs-on: hl-cn-default-lin-sm
    outputs:
      failure-mode: ${{ steps.set-failure-mode.outputs.failure-mode }}
      failed-tests: ${{ steps.set-failure-mode.outputs.failed-tests }}
    needs:
      - commit-info
      - compile-and-spotless
      - dependency-check
      - mats-unit-tests
      - mats-integration-tests
      - mats-hapi-tests
      - mats-otter-tests
      - mats-snyk-scan
      - mats-gradle-determinism
      - mats-docker-determinism
    if: ${{ always() }}
    steps:
      - name: Initialize GitHub Job
        uses: pandaswhocode/initialize-github-job@c392c3e699995ab6030915302d2fc9bffb1e861f # v1.1.0
        with:
          checkout: "true"
          checkout-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Set Failure Mode
        id: set-failure-mode
        env:
          INPUT_JOB_STATUSES: >-
            ${{ needs.commit-info.result }}
            ${{ needs.compile-and-spotless.result }}
            ${{ needs.dependency-check.result }}
            ${{ needs.mats-unit-tests.result }}
            ${{ needs.mats-integration-tests.result }}
            ${{ needs.mats-hapi-tests.result }}
            ${{ needs.mats-otter-tests.result }}
            ${{ needs.mats-snyk-scan.result }}
            ${{ needs.mats-gradle-determinism.result }}
            ${{ needs.mats-docker-determinism.result }}
          INPUT_JOB_FAILURE_MODES: >-
            ${{ needs.commit-info.outputs.failure-mode || 'none' }}
            ${{ needs.compile-and-spotless.outputs.failure-mode || 'none' }}
            ${{ needs.dependency-check.outputs.failure-mode || 'none' }}
            ${{ needs.mats-unit-tests.outputs.failure-mode || 'none' }}
            ${{ needs.mats-integration-tests.outputs.failure-mode || 'none' }}
            ${{ needs.mats-hapi-tests.outputs.failure-mode || 'none' }}
            ${{ needs.mats-otter-tests.outputs.failure-mode || 'none' }}
            ${{ needs.mats-snyk-scan.outputs.failure-mode || 'none' }}
            ${{ needs.mats-gradle-determinism.outputs.failure-mode || 'none' }}
            ${{ needs.mats-docker-determinism.outputs.failure-mode || 'none' }}
          INPUT_JOB_NAMES: >-
            commit-info
            compile-and-spotless
            dependency-check
            mats-unit-tests
            mats-integration-tests
            mats-hapi-tests
            mats-otter-tests
            mats-snyk-scan
            mats-gradle-determinism
            mats-docker-determinism
        run: bash .github/workflows/support/scripts/set-failure-mode.sh
