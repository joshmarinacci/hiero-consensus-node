# SPDX-License-Identifier: Apache-2.0
name: "855: [CALL] Extract CITR Vars"

on:
  workflow_call:
    inputs:
      ref:
        description: "The git ref to read .github/workflows/support/citr/.citr-env from (branch, tag, or commit SHA)."
        type: string
        default: ""
    secrets:
      github-token:
        required: true
        description: "GitHub Authorization Token for the workflow"
    outputs:
      adhoc-solo-version:
        value: ${{ jobs.extract-citr-vars.outputs.adhoc-solo-version }}
      adhoc-xts-solo-version:
        value: ${{ jobs.extract-citr-vars.outputs.adhoc-xts-solo-version }}
      citr-mirror-node-version:
        value: ${{ jobs.extract-citr-vars.outputs.citr-mirror-node-version }}
      citr-solo-version:
        value: ${{ jobs.extract-citr-vars.outputs.citr-solo-version }}
      mqpt-cluster:
        value: ${{ jobs.extract-citr-vars.outputs.mqpt-cluster }}

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  extract-citr-vars:
    name: Extract CITR Variables
    runs-on: hl-cn-default-lin-sm
    outputs:
      adhoc-solo-version: ${{ steps.get-citr-vars.outputs.adhoc-solo-version }}
      adhoc-xts-solo-version: ${{ steps.get-citr-vars.outputs.adhoc-xts-solo-version }}
      citr-mirror-node-version: ${{ steps.get-citr-vars.outputs.citr-mirror-node-version }}
      citr-solo-version: ${{ steps.get-citr-vars.outputs.citr-solo-version }}
      mqpt-cluster: ${{ steps.get-citr-vars.outputs.mqpt-cluster }}
    steps:
      - name: Initialize Job
        uses: pandaswhocode/initialize-github-job@c392c3e699995ab6030915302d2fc9bffb1e861f # v1.1.0
        with:
          checkout: "true"
          checkout-token: "${{ secrets.github-token }}"
          checkout-ref: "${{ inputs.ref }}"
          checkout-fetch-depth: "1"

      - name: Get CITR Vars
        id: get-citr-vars
        run: |
          echo "::group::Extract CITR variables from .citr-env"
          ENV_FILE=".github/workflows/support/citr/.citr-env"
          if [[ ! -f "${ENV_FILE}" ]]; then
            echo "::error::CITR environment file not found at ${ENV_FILE}"
            exit 1
          fi

          while IFS='=' read -r key value; do
            [[ -z "${key}" || "${key}" == \#* ]] && continue
            echo "${key}=${value}" | tee -a "${GITHUB_OUTPUT}"
          done < "${ENV_FILE}"
          echo "::endgroup::"
