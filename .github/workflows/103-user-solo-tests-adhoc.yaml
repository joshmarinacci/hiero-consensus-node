# SPDX-License-Identifier: Apache-2.0
name: "103: [USER] Solo Tests Adhoc"

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "[All] Consensus-node branch, tag, or SHA to checkout. Determines both the version of the local build (when used) and the version of the scripts that drive the run."
        required: true
        type: string
      solo-version:
        description: "[All] Solo version to install."
        required: true
        type: string
        default: "latest"
      scenario:
        description: "Which Solo test scenario to run."
        required: true
        type: choice
        default: "jumpstart"
        options:
          - "jumpstart"
          - "wrb-streaming"
          - "e2e-block-stream-cutover"
          - "075-to-076-tss"
      cluster-target:
        description: "Where to run. kind = ephemeral cluster on the runner; remote-sdlt-n6 = remote solo-sdlt-n6 via Teleport."
        required: true
        type: choice
        default: "kind"
        options:
          - "kind"
          - "remote-sdlt-n6"
      jumpstart-starting-tag:
        description: "[Jumpstart] Consensus-node release tag for the initial network deploy. Blank → v0.74.0."
        required: false
        type: string
        default: ""
      jumpstart-upgrade-tag:
        description: "[Jumpstart] Consensus-node release tag to upgrade to. Blank → v0.75.0-rc.5; 'local' → the local build from the checked-out ref; or any release tag."
        required: false
        type: string
        default: ""
      cutover-upgrade-075-version:
        description: "[Cutover] Consensus-node release tag for the 0.75 upgrade step. Blank → v0.75.0-rc.5."
        required: false
        type: string
        default: ""
      tss-starting-tag:
        description: "[075-to-076-tss] Consensus-node release tag for the initial 0.75 network deploy. Leave blank to default to v0.75.0-rc.5."
        required: false
        type: string
        default: ""
      tss-upgrade-tag:
        description: "[075-to-076-tss] Consensus-node release tag to upgrade the 0.75 network to. Leave blank to build and upgrade to the local build from the checked-out ref."
        required: false
        type: string
        default: ""

defaults:
  run:
    shell: bash

permissions:
  contents: read
  actions: read
  id-token: write # required for Teleport OIDC auth when cluster-target == remote-sdlt-n6

# Every remote-sdlt-n6 run (any scenario) shares the solo-sdlt-n6 namespace + solo-sdlt-n6-test
# deployment, so they must run one-at-a-time: concurrent runs collide (Solo deployment lock contention,
# and one run's "consensus network destroy" deletes another's solo-remote-config ConfigMap / pods).
# Kind runs are isolated (ephemeral cluster per run), so they get a unique group and may run in parallel.
# Note: GitHub keeps only one queued run per group, so dispatch remote runs one at a time.
concurrency:
  group: ${{ inputs.cluster-target == 'remote-sdlt-n6' && 'solo-adhoc-remote-sdlt-n6' || github.run_id }}
  cancel-in-progress: false

env:
  SOLO_CLUSTER_NAME: "solo"
  SOLO_NAMESPACE: "solo"
  SOLO_DEPLOYMENT: "solo-deployment"
  SOLO_CLUSTER_SETUP_NAMESPACE: "solo-cluster"
  GRADLE_EXEC: ionice -c 2 -n 2 nice -n 19 ./gradlew

jobs:
  extract-jdk-version:
    name: Extract Java Version
    uses: ./.github/workflows/854-call-extract-jdk-version.yaml
    with:
      ref: ${{ github.ref }}
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}

  solo-jumpstart-wrb:
    name: "Solo Jumpstart for Wrapped Record Blocks (WRB)"
    needs:
      - extract-jdk-version
    if: ${{ inputs.scenario == 'jumpstart' }}
    # Kind runs on the relay runner; the remote cluster is only reachable from the SDLT runner (Teleport).
    runs-on: ${{ inputs.cluster-target == 'remote-sdlt-n6' && 'hl-cn-sdlt-lin-lg' || 'hl-cn-rpc-relay-lin-lg' }}
    timeout-minutes: 120
    env:
      # On the shared remote cluster the network lives in the solo-sdlt-n6 namespace; on Kind it is
      # the default "solo". This job-level override also applies to the diagnostics/cleanup steps.
      SOLO_NAMESPACE: ${{ inputs.cluster-target == 'remote-sdlt-n6' && 'solo-sdlt-n6' || 'solo' }}
    steps:
      - name: Prepare Runner
        id: prepare-runner
        uses: pandaswhocode/initialize-github-job@c392c3e699995ab6030915302d2fc9bffb1e861f # v1.1.0
        with:
          checkout: "true"
          checkout-ref: "${{ inputs.ref }}"
          checkout-token: "${{ secrets.GITHUB_TOKEN }}"
          checkout-fetch-depth: "0"
          setup-java: "true"
          java-version: "${{ needs.extract-jdk-version.outputs.jdk-version }}"
          java-distribution: "temurin"
          setup-gradle: "true"
          gradle-cache-read-only: "false"
          setup-node: "true"
          node-version: "20.18.0"

      - name: Checkout Block Node (main)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: hiero-ledger/hiero-block-node
          ref: main
          path: hiero-block-node
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Install Solo
        run: |
          npm install -g "@hiero-ledger/solo@${{ inputs.solo-version }}"
          solo --version

      - name: Setup Kind
        if: ${{ inputs.cluster-target == 'kind' }}
        uses: helm/kind-action@a1b0e391336a6ee6713a0583f8c6240d70863de3 # v1.12.0
        with:
          install_only: true
          node_image: kindest/node:v1.32.0
          version: v0.29.0
          kubectl_version: v1.32.2
          verbosity: 3
          wait: 120s

      # Remote-only: Kind normally provides kubectl, so install it explicitly here.
      - name: Install KubeCtl
        if: ${{ inputs.cluster-target == 'remote-sdlt-n6' }}
        uses: step-security/setup-kubectl@2edbf6aff97d814e9dc52827498ac51fe972e6d0 # v4.0.0
        with:
          version: v1.32.5

      - name: Install Teleport Client
        if: ${{ inputs.cluster-target == 'remote-sdlt-n6' }}
        uses: teleport-actions/setup@176c25dfcd19cd31a252f275d579822b243e7b9c # v1.0.6
        with:
          version: 18.4.0

      - name: Authorize Teleport SSH Access
        if: ${{ inputs.cluster-target == 'remote-sdlt-n6' }}
        id: auth-ssh
        uses: teleport-actions/auth@685adaf480dc79262a99220eb158a92136d5abd9 # v2.0.3
        with:
          proxy: hashgraph.teleport.sh:443
          token: gh-citr-performance-svcs-bot
          certificate-ttl: 24h

      - name: Authorize Teleport K8S Access
        if: ${{ inputs.cluster-target == 'remote-sdlt-n6' }}
        id: auth-k8s
        uses: teleport-actions/auth-k8s@677da98eaa78a5e649d4c5b4012750af4c28af73 # v2.0.3
        with:
          proxy: hashgraph.teleport.sh:443
          token: gh-citr-performance-svcs-bot
          kubernetes-cluster: k8s.pft.chi.lat.ope.eng.hashgraph.io
          certificate-ttl: 24h

      - name: Install Helm v3.14.2
        run: |
          set -eo pipefail
          HELM_VERSION="v3.14.2"
          ARCHIVE="helm-${HELM_VERSION}-linux-amd64.tar.gz"
          curl -fsSL "https://get.helm.sh/${ARCHIVE}" -o "${RUNNER_TEMP}/${ARCHIVE}"
          tar -xzf "${RUNNER_TEMP}/${ARCHIVE}" -C "${RUNNER_TEMP}"
          cp -f "${RUNNER_TEMP}/linux-amd64/helm" "${RUNNER_TEMP}/helm"
          chmod +x "${RUNNER_TEMP}/helm"
          export PATH="${RUNNER_TEMP}:${PATH}"
          echo "${RUNNER_TEMP}" >> "${GITHUB_PATH}"
          "${RUNNER_TEMP}/helm" version --short

      - name: Verify Solo Dependency Versions
        run: |
          set -eo pipefail
          helm version --short
          if command -v kind >/dev/null 2>&1; then kind --version; fi
          kubectl version --client=true

      - name: Build Consensus Node Local Artifacts
        # Only the explicit local-build opt-in (jumpstart-upgrade-tag=local) needs a local build; the
        # default (v0.75.0-rc.5) and any release tag pull the published image instead.
        if: ${{ inputs.jumpstart-upgrade-tag == 'local' }}
        run: ${GRADLE_EXEC} assemble

      - name: Run WRB Solo Jumpstart Scenario
        env:
          INITIAL_RELEASE_TAG: ${{ inputs.jumpstart-starting-tag || 'v0.74.0' }}
          # Raw input; the run step resolves blank → v0.75.0-rc.5 and the "local" sentinel → local build.
          RAW_UPGRADE_TAG: ${{ inputs.jumpstart-upgrade-tag }}
          CLUSTER_TARGET: ${{ inputs.cluster-target == 'remote-sdlt-n6' && 'remote' || 'kind' }}
          KUBE_CONTEXT: ${{ inputs.cluster-target == 'remote-sdlt-n6' && 'hashgraph.teleport.sh-k8s.pft.chi.lat.ope.eng.hashgraph.io' || '' }}
          # Remote MinIO record downloads are slow; the migration-vote comparison already validates the
          # jumpstart, so skip the optional, time-consuming saved-state re-wrap on remote (it re-downloads
          # all records 0..lastBlock and otherwise blows the job timeout). Kind keeps the full check.
          VERIFY_STATE_BLOCK_INFO: ${{ inputs.cluster-target == 'remote-sdlt-n6' && 'false' || 'true' }}
        run: |
          set -eo pipefail
          # Resolve the upgrade target: blank → pinned v0.75.0-rc.5; "local" → local build (empty
          # UPGRADE_TAG makes the script take its --local-build-path path); else → that release tag.
          if [[ "${RAW_UPGRADE_TAG}" == "local" ]]; then
            UPGRADE_TAG=""
          else
            UPGRADE_TAG="${RAW_UPGRADE_TAG:-v0.75.0-rc.5}"
          fi
          SCRIPT_PATH="hedera-node/test-clients/scripts/solo/wrapped-record-block-jumpstart/solo-wrb-jumpstart.sh"
          chmod +x "${SCRIPT_PATH}"
          timeout --signal=SIGINT --kill-after=5m 75m \
            env \
              BLOCK_NODE_REPO_PATH="${GITHUB_WORKSPACE}/hiero-block-node" \
              INITIAL_RELEASE_TAG="${INITIAL_RELEASE_TAG}" \
              UPGRADE_TAG="${UPGRADE_TAG}" \
              CLUSTER_TARGET="${CLUSTER_TARGET}" \
              KUBE_CONTEXT="${KUBE_CONTEXT}" \
              SOLO_NAMESPACE="${SOLO_NAMESPACE}" \
              VERIFY_STATE_BLOCK_INFO="${VERIFY_STATE_BLOCK_INFO}" \
              KEEP_NETWORK="false" \
            "${SCRIPT_PATH}" --nodes 3 | tee "${RUNNER_TEMP}/wrb-script.log"

      - name: Collect Diagnostics On Failure
        if: ${{ !cancelled() && failure() }}
        run: |
          set +e
          OUT_DIR="${RUNNER_TEMP}/wrb-diagnostics"
          mkdir -p "${OUT_DIR}"

          kubectl get pods -A -o wide > "${OUT_DIR}/kubectl-pods.txt" 2>&1
          kubectl get svc -A > "${OUT_DIR}/kubectl-services.txt" 2>&1
          kubectl get events -A --sort-by=.lastTimestamp > "${OUT_DIR}/kubectl-events.txt" 2>&1

          for node in node1 node2 node3 node4; do
            pod="network-${node}-0"
            kubectl -n "${SOLO_NAMESPACE}" logs "${pod}" -c root-container --tail=-1 > "${OUT_DIR}/${pod}-root-container.log" 2>&1
            kubectl -n "${SOLO_NAMESPACE}" exec "${pod}" -c root-container -- sh -lc \
              "cat /opt/hgcapp/services-hedera/HapiApp2.0/output/hgcaa.log" \
              > "${OUT_DIR}/${pod}-hgcaa.log" 2>&1
          done

          if [[ -d "${HOME}/.solo/logs" ]]; then
            mkdir -p "${OUT_DIR}/solo-logs"
            cp -R "${HOME}/.solo/logs/." "${OUT_DIR}/solo-logs/" || true
          fi

      - name: Upload WRB Failure Artifacts
        if: ${{ !cancelled() && failure() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: WRB Solo Jumpstart Failure Artifacts
          path: |
            ${{ runner.temp }}/wrb-script.log
            ${{ runner.temp }}/wrb-diagnostics/**
            hedera-node/test-clients/scripts/solo/wrapped-record-block-jumpstart/generated/**
          if-no-files-found: warn
          retention-days: 7

      # Kind-only: the remote cluster is shared/pre-allocated and must never be deleted; on remote the
      # script's own KEEP_NETWORK=false cleanup tears down just the consensus network.
      - name: Always Destroy Kind Cluster
        if: ${{ always() && inputs.cluster-target == 'kind' }}
        continue-on-error: true
        run: |
          kind delete cluster -n "wrb-jumpstart"

  solo-e2e-block-stream-cutover:
    name: "Solo E2E Block Stream Cutover"
    needs:
      - extract-jdk-version
    if: ${{ inputs.scenario == 'e2e-block-stream-cutover' }}
    runs-on: ${{ inputs.cluster-target == 'remote-sdlt-n6' && 'hl-cn-sdlt-lin-lg' || 'hl-cn-rpc-relay-lin-lg' }}
    timeout-minutes: 180
    env:
      SOLO_CLUSTER_NAME: "cutover-e2e-testing"
      SOLO_NAMESPACE: ${{ inputs.cluster-target == 'remote-sdlt-n6' && 'solo-sdlt-n6' || 'solo' }}
    steps:
      - name: Prepare Runner
        id: prepare-runner
        uses: pandaswhocode/initialize-github-job@c392c3e699995ab6030915302d2fc9bffb1e861f # v1.1.0
        with:
          checkout: "true"
          checkout-ref: "${{ inputs.ref }}"
          checkout-token: "${{ secrets.GITHUB_TOKEN }}"
          checkout-fetch-depth: "0"
          setup-java: "true"
          java-version: "${{ needs.extract-jdk-version.outputs.jdk-version }}"
          java-distribution: "temurin"
          setup-gradle: "true"
          gradle-cache-read-only: "false"
          setup-node: "true"
          node-version: "20.18.0"

      - name: Checkout Block Node (main)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: hiero-ledger/hiero-block-node
          ref: main
          path: hiero-block-node
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Install Solo
        run: |
          npm install -g "@hiero-ledger/solo@${{ inputs.solo-version }}"
          solo --version

      - name: Setup Kind
        if: ${{ inputs.cluster-target == 'kind' }}
        uses: helm/kind-action@a1b0e391336a6ee6713a0583f8c6240d70863de3 # v1.12.0
        with:
          install_only: true
          node_image: kindest/node:v1.32.0
          version: v0.29.0
          kubectl_version: v1.32.2
          verbosity: 3
          wait: 120s

      # Remote-only: Kind normally provides kubectl, so install it explicitly here.
      - name: Install KubeCtl
        if: ${{ inputs.cluster-target == 'remote-sdlt-n6' }}
        uses: step-security/setup-kubectl@2edbf6aff97d814e9dc52827498ac51fe972e6d0 # v4.0.0
        with:
          version: v1.32.5

      - name: Install Teleport Client
        if: ${{ inputs.cluster-target == 'remote-sdlt-n6' }}
        uses: teleport-actions/setup@176c25dfcd19cd31a252f275d579822b243e7b9c # v1.0.6
        with:
          version: 18.4.0

      - name: Authorize Teleport SSH Access
        if: ${{ inputs.cluster-target == 'remote-sdlt-n6' }}
        id: auth-ssh
        uses: teleport-actions/auth@685adaf480dc79262a99220eb158a92136d5abd9 # v2.0.3
        with:
          proxy: hashgraph.teleport.sh:443
          token: gh-citr-performance-svcs-bot
          certificate-ttl: 24h

      - name: Authorize Teleport K8S Access
        if: ${{ inputs.cluster-target == 'remote-sdlt-n6' }}
        id: auth-k8s
        uses: teleport-actions/auth-k8s@677da98eaa78a5e649d4c5b4012750af4c28af73 # v2.0.3
        with:
          proxy: hashgraph.teleport.sh:443
          token: gh-citr-performance-svcs-bot
          kubernetes-cluster: k8s.pft.chi.lat.ope.eng.hashgraph.io
          certificate-ttl: 24h

      - name: Install Helm v3.14.2
        run: |
          set -eo pipefail
          HELM_VERSION="v3.14.2"
          ARCHIVE="helm-${HELM_VERSION}-linux-amd64.tar.gz"
          curl -fsSL "https://get.helm.sh/${ARCHIVE}" -o "${RUNNER_TEMP}/${ARCHIVE}"
          tar -xzf "${RUNNER_TEMP}/${ARCHIVE}" -C "${RUNNER_TEMP}"
          cp -f "${RUNNER_TEMP}/linux-amd64/helm" "${RUNNER_TEMP}/helm"
          chmod +x "${RUNNER_TEMP}/helm"
          export PATH="${RUNNER_TEMP}:${PATH}"
          echo "${RUNNER_TEMP}" >> "${GITHUB_PATH}"
          "${RUNNER_TEMP}/helm" version --short

      - name: Verify Solo Dependency Versions
        run: |
          set -eo pipefail
          helm version --short
          if command -v kind >/dev/null 2>&1; then kind --version; fi
          kubectl version --client=true

      - name: Install xxd
        run: |
          set -eo pipefail
          if ! command -v xxd >/dev/null 2>&1; then
            sudo apt-get update -y
            sudo apt-get install -y xxd
          fi
          xxd -v

      - name: Install grpcurl
        run: |
          curl -L https://github.com/fullstorydev/grpcurl/releases/download/v1.8.7/grpcurl_1.8.7_linux_x86_64.tar.gz -o grpcurl.tar.gz
          sudo tar -xzf grpcurl.tar.gz -C /usr/local/bin grpcurl
          rm grpcurl.tar.gz
          grpcurl --version

      - name: Build Consensus Node Local Artifacts
        run: ${GRADLE_EXEC} assemble

      - name: Run E2E Block Stream Cutover Scenario
        env:
          CLUSTER_TARGET: ${{ inputs.cluster-target == 'remote-sdlt-n6' && 'remote' || 'kind' }}
          KUBE_CONTEXT: ${{ inputs.cluster-target == 'remote-sdlt-n6' && 'hashgraph.teleport.sh-k8s.pft.chi.lat.ope.eng.hashgraph.io' || '' }}
        run: |
          set -eo pipefail
          SCRIPT_PATH="hedera-node/test-clients/scripts/solo/e2e-block-stream-cutover/solo-e2e-block-stream-cutover.sh"
          chmod +x "${SCRIPT_PATH}"
          timeout --signal=SIGINT --kill-after=5m 150m \
            env \
              BLOCK_NODE_REPO_PATH="${GITHUB_WORKSPACE}/hiero-block-node" \
              UPGRADE_075_VERSION="${{ inputs.cutover-upgrade-075-version || 'v0.75.0-rc.5' }}" \
              CLUSTER_TARGET="${CLUSTER_TARGET}" \
              KUBE_CONTEXT="${KUBE_CONTEXT}" \
              SOLO_NAMESPACE="${SOLO_NAMESPACE}" \
              KEEP_NETWORK="false" \
            "${SCRIPT_PATH}" --nodes 4 | tee "${RUNNER_TEMP}/cutover-script.log"

      - name: Collect Diagnostics On Failure
        if: ${{ !cancelled() && failure() }}
        run: |
          set +e
          OUT_DIR="${RUNNER_TEMP}/cutover-diagnostics"
          mkdir -p "${OUT_DIR}"

          kubectl get pods -A -o wide > "${OUT_DIR}/kubectl-pods.txt" 2>&1
          kubectl get svc -A > "${OUT_DIR}/kubectl-services.txt" 2>&1
          kubectl get events -A --sort-by=.lastTimestamp > "${OUT_DIR}/kubectl-events.txt" 2>&1
          kubectl -n "${SOLO_NAMESPACE}" logs "pod/block-node-1-0" --all-containers --tail=-1 \
            > "${OUT_DIR}/block-node-1-0.log" 2>&1

          for node in node1 node2 node3 node4; do
            pod="network-${node}-0"
            kubectl -n "${SOLO_NAMESPACE}" logs "${pod}" -c root-container --tail=-1 > "${OUT_DIR}/${pod}-root-container.log" 2>&1
            kubectl -n "${SOLO_NAMESPACE}" exec "${pod}" -c root-container -- sh -lc \
              "cat /opt/hgcapp/services-hedera/HapiApp2.0/output/hgcaa.log" \
              > "${OUT_DIR}/${pod}-hgcaa.log" 2>&1
          done

          if [[ -d "${HOME}/.solo/logs" ]]; then
            mkdir -p "${OUT_DIR}/solo-logs"
            cp -R "${HOME}/.solo/logs/." "${OUT_DIR}/solo-logs/" || true
          fi

      - name: Upload Cutover Failure Artifacts
        if: ${{ !cancelled() && failure() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: E2E Block Stream Cutover Failure Artifacts
          path: |
            ${{ runner.temp }}/cutover-script.log
            ${{ runner.temp }}/cutover-diagnostics/**
            hedera-node/test-clients/scripts/solo/e2e-block-stream-cutover/generated/**
          if-no-files-found: warn
          retention-days: 7

      - name: Always Destroy Kind Cluster
        if: ${{ always() }}
        continue-on-error: true
        run: |
          kind delete cluster -n "${SOLO_CLUSTER_NAME}"

  solo-075-to-076-tss:
    name: "Solo 0.75 -> 0.76 TSS Upgrade"
    needs:
      - extract-jdk-version
    if: ${{ inputs.scenario == '075-to-076-tss' }}
    runs-on: hl-cn-rpc-relay-lin-lg
    timeout-minutes: 120
    env:
      SOLO_CLUSTER_NAME: "tss-075-to-076"
    steps:
      - name: Prepare Runner
        id: prepare-runner
        uses: pandaswhocode/initialize-github-job@3be139d343b1a60e1fcfc70f602ee804bbe3495d # v1.1.1
        with:
          checkout: "true"
          checkout-ref: "${{ inputs.ref }}"
          checkout-token: "${{ secrets.GITHUB_TOKEN }}"
          checkout-fetch-depth: "0"
          setup-java: "true"
          java-version: "${{ needs.extract-jdk-version.outputs.jdk-version }}"
          java-distribution: "temurin"
          setup-gradle: "true"
          gradle-cache-read-only: "false"
          setup-node: "true"
          node-version: "22"

      - name: Checkout Block Node (main)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: hiero-ledger/hiero-block-node
          ref: main
          path: hiero-block-node
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Install Solo
        run: |
          npm install -g "@hiero-ledger/solo@${{ inputs.solo-version }}"
          solo --version

      - name: Setup Kind
        uses: helm/kind-action@a1b0e391336a6ee6713a0583f8c6240d70863de3 # v1.12.0
        with:
          install_only: true
          node_image: kindest/node:v1.32.0
          version: v0.29.0
          kubectl_version: v1.32.2
          verbosity: 3
          wait: 120s

      - name: Install Helm v3.14.2
        run: |
          set -eo pipefail
          HELM_VERSION="v3.14.2"
          ARCHIVE="helm-${HELM_VERSION}-linux-amd64.tar.gz"
          curl -fsSL "https://get.helm.sh/${ARCHIVE}" -o "${RUNNER_TEMP}/${ARCHIVE}"
          tar -xzf "${RUNNER_TEMP}/${ARCHIVE}" -C "${RUNNER_TEMP}"
          install "${RUNNER_TEMP}/linux-amd64/helm" "${RUNNER_TEMP}/helm"
          export PATH="${RUNNER_TEMP}:${PATH}"
          echo "${RUNNER_TEMP}" >> "${GITHUB_PATH}"
          "${RUNNER_TEMP}/helm" version --short

      - name: Verify Solo Dependency Versions
        run: |
          set -eo pipefail
          helm version --short
          kind --version
          kubectl version --client=true

      - name: Install grpcurl
        run: |
          curl -L https://github.com/fullstorydev/grpcurl/releases/download/v1.8.7/grpcurl_1.8.7_linux_x86_64.tar.gz -o grpcurl.tar.gz
          sudo tar -xzf grpcurl.tar.gz -C /usr/local/bin grpcurl
          rm grpcurl.tar.gz
          grpcurl --version

      - name: Build Consensus Node Local Artifacts
        if: ${{ inputs.tss-upgrade-tag == '' }}
        run: ${GRADLE_EXEC} assemble

      - name: Run 0.75 -> 0.76 TSS Upgrade Scenario
        run: |
          set -eo pipefail
          SCRIPT_PATH="hedera-node/test-clients/scripts/solo/e2e-block-stream-cutover/solo-075-to-076-tss.sh"
          chmod +x "${SCRIPT_PATH}"
          timeout --signal=SIGINT --kill-after=5m 100m \
            env \
              BLOCK_NODE_REPO_PATH="${GITHUB_WORKSPACE}/hiero-block-node" \
              DEPLOY_RELEASE_TAG="${{ inputs.tss-starting-tag || 'v0.75.0-rc.5' }}" \
              UPGRADE_TAG="${{ inputs.tss-upgrade-tag }}" \
            "${SCRIPT_PATH}" | tee "${RUNNER_TEMP}/075-to-076-tss-script.log"

      - name: Collect Diagnostics On Failure
        if: ${{ !cancelled() && failure() }}
        run: |
          set +e
          OUT_DIR="${RUNNER_TEMP}/075-to-076-tss-diagnostics"
          mkdir -p "${OUT_DIR}"

          kubectl get pods -A -o wide > "${OUT_DIR}/kubectl-pods.txt" 2>&1
          kubectl get svc -A > "${OUT_DIR}/kubectl-services.txt" 2>&1
          kubectl get events -A --sort-by=.lastTimestamp > "${OUT_DIR}/kubectl-events.txt" 2>&1
          kubectl -n "${SOLO_NAMESPACE}" logs "pod/block-node-1-0" --all-containers --tail=-1 \
            > "${OUT_DIR}/block-node-1-0.log" 2>&1

          for node in node1 node2 node3 node4; do
            pod="network-${node}-0"
            kubectl -n "${SOLO_NAMESPACE}" logs "${pod}" -c root-container --tail=-1 > "${OUT_DIR}/${pod}-root-container.log" 2>&1
            kubectl -n "${SOLO_NAMESPACE}" exec "${pod}" -c root-container -- sh -lc \
              "cat /opt/hgcapp/services-hedera/HapiApp2.0/output/hgcaa.log" \
              > "${OUT_DIR}/${pod}-hgcaa.log" 2>&1
          done

          if [[ -d "${HOME}/.solo/logs" ]]; then
            mkdir -p "${OUT_DIR}/solo-logs"
            cp -R "${HOME}/.solo/logs/." "${OUT_DIR}/solo-logs/" || true
          fi

      - name: Upload 075-to-076 TSS Failure Artifacts
        if: ${{ !cancelled() && failure() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: 075-to-076-TSS-Failure-Artifacts
          path: |
            ${{ runner.temp }}/075-to-076-tss-script.log
            ${{ runner.temp }}/075-to-076-tss-diagnostics/**
            hedera-node/test-clients/scripts/solo/e2e-block-stream-cutover/generated/**
          if-no-files-found: warn
          retention-days: 7

      # Kind-only: the remote cluster is shared/pre-allocated and must never be deleted.
      - name: Always Destroy Kind Cluster
        if: ${{ always() && inputs.cluster-target == 'kind' }}
        continue-on-error: true
        run: |
          kind delete cluster -n "${SOLO_CLUSTER_NAME}"

  solo-wrb-block-node-streaming:
    name: "Solo WRB Streaming to Block Node"
    needs:
      - extract-jdk-version
    if: ${{ inputs.scenario == 'wrb-streaming' }}
    runs-on: ${{ inputs.cluster-target == 'remote-sdlt-n6' && 'hl-cn-sdlt-lin-lg' || 'hl-cn-rpc-relay-lin-lg' }}
    timeout-minutes: 120
    env:
      SOLO_NAMESPACE: ${{ inputs.cluster-target == 'remote-sdlt-n6' && 'solo-sdlt-n6' || 'solo' }}
    steps:
      - name: Prepare Runner
        id: prepare-runner
        uses: pandaswhocode/initialize-github-job@c392c3e699995ab6030915302d2fc9bffb1e861f # v1.1.0
        with:
          checkout: "true"
          checkout-ref: "${{ inputs.ref }}"
          checkout-fetch-depth: "0"
          checkout-token: "${{ github.token }}"
          setup-java: "true"
          java-version: "${{ needs.extract-jdk-version.outputs.jdk-version }}"
          java-distribution: "temurin"
          setup-gradle: "true"
          gradle-cache-read-only: "false"
          setup-node: "true"
          node-version: "20.18.0"

      - name: Install Solo
        run: |
          npm install -g "@hiero-ledger/solo@${{ inputs.solo-version }}"
          solo --version

      - name: Setup Kind
        if: ${{ inputs.cluster-target == 'kind' }}
        uses: helm/kind-action@a1b0e391336a6ee6713a0583f8c6240d70863de3 # v1.12.0
        with:
          install_only: true
          node_image: kindest/node:v1.32.0
          version: v0.29.0
          kubectl_version: v1.32.2
          verbosity: 3
          wait: 120s

      # Remote-only: Kind normally provides kubectl, so install it explicitly here.
      - name: Install KubeCtl
        if: ${{ inputs.cluster-target == 'remote-sdlt-n6' }}
        uses: step-security/setup-kubectl@2edbf6aff97d814e9dc52827498ac51fe972e6d0 # v4.0.0
        with:
          version: v1.32.5

      - name: Install Teleport Client
        if: ${{ inputs.cluster-target == 'remote-sdlt-n6' }}
        uses: teleport-actions/setup@176c25dfcd19cd31a252f275d579822b243e7b9c # v1.0.6
        with:
          version: 18.4.0

      - name: Authorize Teleport SSH Access
        if: ${{ inputs.cluster-target == 'remote-sdlt-n6' }}
        id: auth-ssh
        uses: teleport-actions/auth@685adaf480dc79262a99220eb158a92136d5abd9 # v2.0.3
        with:
          proxy: hashgraph.teleport.sh:443
          token: gh-citr-performance-svcs-bot
          certificate-ttl: 24h

      - name: Authorize Teleport K8S Access
        if: ${{ inputs.cluster-target == 'remote-sdlt-n6' }}
        id: auth-k8s
        uses: teleport-actions/auth-k8s@677da98eaa78a5e649d4c5b4012750af4c28af73 # v2.0.3
        with:
          proxy: hashgraph.teleport.sh:443
          token: gh-citr-performance-svcs-bot
          kubernetes-cluster: k8s.pft.chi.lat.ope.eng.hashgraph.io
          certificate-ttl: 24h

      - name: Install Helm v3.14.2
        run: |
          set -eo pipefail
          HELM_VERSION="v3.14.2"
          ARCHIVE="helm-${HELM_VERSION}-linux-amd64.tar.gz"
          curl -fsSL "https://get.helm.sh/${ARCHIVE}" -o "${RUNNER_TEMP}/${ARCHIVE}"
          tar -xzf "${RUNNER_TEMP}/${ARCHIVE}" -C "${RUNNER_TEMP}"
          cp -f "${RUNNER_TEMP}/linux-amd64/helm" "${RUNNER_TEMP}/helm"
          chmod +x "${RUNNER_TEMP}/helm"
          export PATH="${RUNNER_TEMP}:${PATH}"
          echo "${RUNNER_TEMP}" >> "${GITHUB_PATH}"
          "${RUNNER_TEMP}/helm" version --short

      - name: Install grpcurl
        run: |
          curl -L https://github.com/fullstorydev/grpcurl/releases/download/v1.8.7/grpcurl_1.8.7_linux_x86_64.tar.gz -o grpcurl.tar.gz
          sudo tar -xzf grpcurl.tar.gz -C /usr/local/bin grpcurl
          rm grpcurl.tar.gz

      - name: Verify Solo Dependency Versions
        run: |
          set -eo pipefail
          helm version --short
          if command -v kind >/dev/null 2>&1; then kind --version; fi
          grpcurl --version
          kubectl version --client=true

      - name: Resolve Block Node Chart Version
        run: |
          set -eo pipefail
          bn_url="https://api.github.com/repos/hiero-ledger/hiero-block-node/releases/latest"
          curl_response="$(curl -fsSL -H "Accept: application/vnd.github+json" "${bn_url}")"
          latest_bn_tag="$(echo "${curl_response}" | grep -o '"tag_name": *"[^"]*"' | head -1 | sed 's/"tag_name": *"\([^"]*\)"/\1/')"
          if [[ -z "${latest_bn_tag}" ]]; then
            echo "Unable to resolve latest Block Node release tag from ${bn_url}" >&2
            exit 1
          fi

          echo "BLOCK_NODE_CHART_VERSION=${latest_bn_tag}" >> "${GITHUB_ENV}"

      - name: Run WRB Streaming to Block Node Scenario
        env:
          CLUSTER_TARGET: ${{ inputs.cluster-target == 'remote-sdlt-n6' && 'remote' || 'kind' }}
          KUBE_CONTEXT: ${{ inputs.cluster-target == 'remote-sdlt-n6' && 'hashgraph.teleport.sh-k8s.pft.chi.lat.ope.eng.hashgraph.io' || '' }}
        run: |
          set -eo pipefail
          SCRIPT_PATH="hedera-node/test-clients/scripts/solo/wrapped-record-block-jumpstart/solo-wrb-block-node-streaming.sh"
          chmod +x "${SCRIPT_PATH}"
          timeout --signal=SIGINT --kill-after=5m 75m \
            env \
              RELEASE_TAG="v0.75.0-rc.5" \
              BLOCK_NODE_RELEASE_TAG="v0.75.0-rc.5" \
              BLOCK_NODE_CHART_VERSION="${BLOCK_NODE_CHART_VERSION}" \
              USE_LOCAL_BUILD="false" \
              CLUSTER_TARGET="${CLUSTER_TARGET}" \
              KUBE_CONTEXT="${KUBE_CONTEXT}" \
              SOLO_NAMESPACE="${SOLO_NAMESPACE}" \
              KEEP_NETWORK="false" \
            "${SCRIPT_PATH}" --nodes 3 | tee "${RUNNER_TEMP}/wrb-block-node-streaming-script.log"

      - name: Collect Diagnostics On Failure
        if: ${{ !cancelled() && failure() }}
        run: |
          set +e
          OUT_DIR="${RUNNER_TEMP}/wrb-block-node-streaming-diagnostics"
          mkdir -p "${OUT_DIR}"

          kubectl get pods -A -o wide > "${OUT_DIR}/kubectl-pods.txt" 2>&1
          kubectl get svc -A > "${OUT_DIR}/kubectl-services.txt" 2>&1
          kubectl get events -A --sort-by=.lastTimestamp > "${OUT_DIR}/kubectl-events.txt" 2>&1
          kubectl -n "${SOLO_NAMESPACE}" logs "pod/block-node-1-0" --all-containers --tail=-1 \
            > "${OUT_DIR}/block-node-1-0.log" 2>&1

          for node in node1 node2 node3; do
            pod="network-${node}-0"
            kubectl -n "${SOLO_NAMESPACE}" logs "${pod}" -c root-container --tail=-1 > "${OUT_DIR}/${pod}-root-container.log" 2>&1
            kubectl -n "${SOLO_NAMESPACE}" exec "${pod}" -c root-container -- sh -lc \
              "cat /opt/hgcapp/services-hedera/HapiApp2.0/output/hgcaa.log" \
              > "${OUT_DIR}/${pod}-hgcaa.log" 2>&1
          done

          if [[ -d "${HOME}/.solo/logs" ]]; then
            mkdir -p "${OUT_DIR}/solo-logs"
            cp -R "${HOME}/.solo/logs/." "${OUT_DIR}/solo-logs/" || true
          fi

      - name: Upload WRB Streaming Failure Artifacts
        if: ${{ !cancelled() && failure() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: WRB Block Node Streaming Failure Artifacts
          path: |
            ${{ runner.temp }}/wrb-block-node-streaming-script.log
            ${{ runner.temp }}/wrb-block-node-streaming-diagnostics/**
            hedera-node/test-clients/scripts/solo/wrapped-record-block-jumpstart/generated/**
          if-no-files-found: warn
          retention-days: 7

      # Kind-only: the remote cluster is shared/pre-allocated and must never be deleted.
      - name: Always Destroy Kind Cluster
        if: ${{ always() && inputs.cluster-target == 'kind' }}
        continue-on-error: true
        run: |
          kind delete cluster -n "${SOLO_CLUSTER_NAME}"
