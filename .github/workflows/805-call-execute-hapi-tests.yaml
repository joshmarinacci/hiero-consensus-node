          if [[ "${{ steps.gradle-hapi-crypto-and-misc-serial.outcome || 'skipped' }}" == "success" \
             || "${{ steps.gradle-hapi-crypto-and-misc-serial.outcome || 'skipped' }}" == "skipped" ]]; then
            echo "failure-mode=none" >> "${GITHUB_OUTPUT}"
          elif [[ "${{ steps.gradle-hapi-crypto-and-misc-serial.outcome || 'skipped' }}" == "failure" ]]; then
            echo "failure-mode=test" >> "${GITHUB_OUTPUT}"
          else
            echo "failure-mode=workflow" >> "${GITHUB_OUTPUT}"
          fi

  hapi-tests-wraps:
    name: "HAPI Tests (Wraps)"
    if: ${{ inputs.enable-hapi-tests-wraps == 'true' }}
    # Dedicated runner pool with the WRAPS proving-key artifacts mounted at
    # /opt/wraps-v1.0.0 (see hedera-node/infrastructure/docker/containers/production-next/wraps-proving-key)
    runs-on: hl-cn-hapi-wraps-lin-lg
    # Genesis + incremental WRAPS proof construction is slow by design; each of the
    # three subtasks also spins up its own 4-node subprocess network
    timeout-minutes: 120
    outputs:
      failure-mode: ${{ steps.set-failure-mode.outputs.failure-mode }}
    steps:
      - name: Prepare Runner
        uses: pandaswhocode/initialize-github-job@c392c3e699995ab6030915302d2fc9bffb1e861f # v1.1.0
        with:
          checkout: "true"
          checkout-ref: "${{ inputs.ref }}"
          checkout-fetch-depth: "1"
          checkout-token: "${{ secrets.access-token }}"
          setup-java: "true"
          java-version: "${{ inputs.java-version }}"
          java-distribution: "${{ inputs.java-distribution }}"
          setup-gradle: "true"
          setup-testlens: "true"
          gradle-cache-read-only: "false"
          setup-node: "true"
          node-version: "${{ inputs.node-version }}"

      - name: HAPI Testing (Wraps)
        id: gradle-hapi-wraps
        env:
          LC_ALL: en.UTF-8
          LANG: en_US.UTF-8
          TSS_LIB_WRAPS_ARTIFACTS_PATH: /opt/wraps-v1.0.0
        run: |
          status=0
          run_subtask() {
            local t=$1
            echo "::group::${t}"
            if ${GRADLE_EXEC} "${t}" --no-daemon; then
              echo "::endgroup::"
              return 0
            fi
            echo "::endgroup::"
            status=1
            echo "::error::${t} failed"
            echo "❌ ${t} FAILED — expand group above for details"
          }
          run_subtask hapiTestWraps
          run_subtask hapiTestCutover
          run_subtask hapiTestWrapsDownload
          exit "${status}"

      - name: Publish HAPI Test (Wraps) Reports
        uses: step-security/publish-unit-test-result-action@7dff603bf17ef13dee847147bef8d7cd1728b566 # v2.22.0
        with:
          check_name: "Node: HAPI Test (Wraps) Results"
          json_thousands_separator: ","
          junit_files: |
            **/test-clients/build/test-results/**/TEST-*.xml
          comment_mode: errors # only comment if we could not find or parse the JUnit XML files

      - name: Upload HAPI Test (Wraps) Report Artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: HAPI Test (Wraps) Reports
          path: |
            **/test-clients/build/test-results/**/TEST-*.xml
          retention-days: 7

      - name: Upload HAPI Test (Wraps) Network Logs
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: ${{ !cancelled() && inputs.enable-network-log-capture && steps.gradle-hapi-wraps.conclusion == 'failure' }}
        with:
          name: HAPI Test (Wraps) Network Logs
          path: |
            hedera-node/test-clients/build/*-test/**/output/**
            hedera-node/test-clients/build/*-test/*.log
            hedera-node/test-clients/output/**
          retention-days: 7

      - name: Upload HAPI Test (Wraps) Failure Artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: ${{ !cancelled() && steps.gradle-hapi-wraps.conclusion == 'failure' }}
        with:
          name: HAPI Test (Wraps) Failure Artifacts
          path: |
            hedera-node/test-clients/build/**/*.blk.gz
            hedera-node/test-clients/build/**/*.rcd.gz
            hedera-node/test-clients/build/**/*.pb
            hedera-node/test-clients/build/**/*.pces
            hedera-node/test-clients/build/*-test/**/output/**
            hedera-node/test-clients/build/*-test/**/*.log
            hedera-node/test-clients/output/**
          retention-days: 7

      - name: Set Failure Mode Output
        id: set-failure-mode
        if: ${{ always() }}
        run: |
          if [[ "${{ steps.gradle-hapi-wraps.outcome || 'skipped' }}" == "success" \
             || "${{ steps.gradle-hapi-wraps.outcome || 'skipped' }}" == "skipped" ]]; then
            echo "failure-mode=none" >> "${GITHUB_OUTPUT}"
          elif [[ "${{ steps.gradle-hapi-wraps.outcome || 'skipped' }}" == "failure" ]]; then
            echo "failure-mode=test" >> "${GITHUB_OUTPUT}"
          else
            echo "failure-mode=workflow" >> "${GITHUB_OUTPUT}"
          fi

  set-failure-mode:
    name: "Set Failure Mode"
    runs-on: hl-cn-default-lin-sm
    needs:
      - hapi-tests-misc
      - hapi-tests-misc-records-crypto-and-serial
      - hapi-tests-token-and-time-consuming
      - hapi-tests-simple-fees-and-nd-reconnect
      - hapi-tests-atomic-batch
      - hapi-tests-smart-contracts-and-iss
      - hapi-tests-restart
      - hapi-tests-bn-comms
      - hapi-tests-state-throttling
      - hapi-tests-crypto-and-misc-serial
      - hapi-tests-wraps
    if: ${{ always() }}
    outputs:
      failure-mode: ${{ steps.set-failure-mode.outputs.failure-mode }}
      failed-tests: ${{ steps.set-failure-mode.outputs.failed-tests }}
    steps:
      - name: Initialize GitHub Job
        uses: pandaswhocode/initialize-github-job@c392c3e699995ab6030915302d2fc9bffb1e861f # v1.1.0
        with:
          checkout: "true"
          checkout-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Set Failure Mode
        id: set-failure-mode
        env:
          INPUT_JOB_STATUSES: >-
            ${{ needs.hapi-tests-misc.result }}
            ${{ needs.hapi-tests-misc-records-crypto-and-serial.result }}
            ${{ needs.hapi-tests-token-and-time-consuming.result }}
            ${{ needs.hapi-tests-simple-fees-and-nd-reconnect.result }}
            ${{ needs.hapi-tests-atomic-batch.result }}
            ${{ needs.hapi-tests-smart-contracts-and-iss.result }}
            ${{ needs.hapi-tests-restart.result }}
            ${{ needs.hapi-tests-bn-comms.result }}
            ${{ needs.hapi-tests-state-throttling.result }}
            ${{ needs.hapi-tests-crypto-and-misc-serial.result }}
            ${{ needs.hapi-tests-wraps.result }}
          INPUT_JOB_FAILURE_MODES: >-
            ${{ needs.hapi-tests-misc.outputs.failure-mode || 'none' }}
            ${{ needs.hapi-tests-misc-records-crypto-and-serial.outputs.failure-mode || 'none' }}
            ${{ needs.hapi-tests-token-and-time-consuming.outputs.failure-mode || 'none' }}
            ${{ needs.hapi-tests-simple-fees-and-nd-reconnect.outputs.failure-mode || 'none' }}
            ${{ needs.hapi-tests-atomic-batch.outputs.failure-mode || 'none' }}
            ${{ needs.hapi-tests-smart-contracts-and-iss.outputs.failure-mode || 'none' }}
            ${{ needs.hapi-tests-restart.outputs.failure-mode || 'none' }}
            ${{ needs.hapi-tests-bn-comms.outputs.failure-mode || 'none' }}
            ${{ needs.hapi-tests-state-throttling.outputs.failure-mode || 'none' }}
            ${{ needs.hapi-tests-crypto-and-misc-serial.outputs.failure-mode || 'none' }}
            ${{ needs.hapi-tests-wraps.outputs.failure-mode || 'none' }}
          INPUT_JOB_NAMES: >-
            hapi-tests-misc
            hapi-tests-misc-records-crypto-and-serial
            hapi-tests-token-and-time-consuming
            hapi-tests-simple-fees-and-nd-reconnect
            hapi-tests-atomic-batch
            hapi-tests-smart-contracts-and-iss
            hapi-tests-restart
            hapi-tests-bn-comms
            hapi-tests-state-throttling
            hapi-tests-crypto-and-misc-serial
            hapi-tests-wraps
        run: bash .github/workflows/support/scripts/set-failure-mode.sh
