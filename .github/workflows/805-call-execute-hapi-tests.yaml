# SPDX-License-Identifier: Apache-2.0
name: "805: [CALL] Exec HAPI Tests"
on:
  workflow_call:
    inputs:
      ref:
        description: "The branch, tag or SHA to checkout."
        required: false
        type: string
        default: ""
      java-distribution:
        description: "Java JDK Distribution:"
        type: string
        required: false
        default: "temurin"
      java-version:
        description: "Java JDK Version:"
        type: string
        required: false
      node-version:
        description: "NodeJS Version:"
        type: string
        required: false
        default: "20"
      enable-network-log-capture:
        description: "Network Log Capture Enabled"
        type: string
        required: false
        default: "false"
      enable-hapi-tests-misc:
        description: "HAPI Testing (Misc) Enabled"
        type: string
        required: false
        default: "false"
      enable-hapi-tests-misc-records-crypto-and-serial:
        description: "HAPI Testing (Misc Records, Crypto & Misc Serial) Enabled"
        type: string
        required: false
        default: "false"
      enable-hapi-tests-token-and-time-consuming:
        description: "HAPI Testing (Token & Time Consuming) Enabled"
        type: string
        required: false
        default: "false"
      enable-hapi-tests-simple-fees-and-nd-reconnect:
        description: "HAPI Testing (Simple Fees & ND Reconnect) Enabled"
        type: string
        required: false
        default: "false"
      enable-hapi-tests-atomic-batch:
        description: "HAPI Testing (Atomic Batch) Enabled"
        type: string
        required: false
        default: "false"
      enable-hapi-tests-smart-contract-and-iss:
        description: "HAPI Testing (Smart Contracts & ISS) Enabled"
        type: string
        required: false
        default: "false"
      enable-hapi-tests-restart:
        description: "HAPI Testing (restart) Enabled"
        type: string
        required: false
        default: "false"
      enable-hapi-tests-bn-communication:
        description: "HAPI Testing (Block Node Communication) Enabled"
        type: string
        required: false
        default: "false"
      enable-hapi-tests-state-throttling:
        description: "HAPI Testing (state throttling) Enabled"
        type: string
        required: false
        default: "false"
      enable-hapi-tests-crypto-and-misc-serial:
        description: "HAPI Testing (Crypto & Misc Serial) Enabled"
        type: string
        required: false
        default: "false"
      enable-hapi-tests-wraps:
        description: "HAPI Testing (Wraps, Cutover & Wraps Download) Enabled"
        type: string
        required: false
        default: "false"
      stream-mode-override:
        description: "Optional blockStream.streamMode override applied to every HAPI subtask (e.g. 'BLOCKS'). Empty = no override."
        type: string
        required: false
        default: ""
      writer-mode-override:
        description: "Optional blockStream.writerMode override applied to every HAPI subtask (e.g. 'FILE'). Empty = no override."
        type: string
        required: false
        default: ""
      wrapped-record-blocks-override:
        description: "Optional blockStream.streamWrappedRecordBlocks override applied to every HAPI subtask (e.g. 'false'). Empty = no override."
        type: string
        required: false
        default: ""
    secrets:
      access-token:
        description: "The GitHub access token used to checkout the repository, submodules, and make GitHub API calls."
        required: true
      gradle-cache-username:
        description: "The username used to authenticate with the Gradle Build Cache Node."
        required: true
      gradle-cache-password:
        description: "The password used to authenticate with the Gradle Build Cache Node."
        required: true
    outputs:
      failure-mode:
        description: "Failure Mode"
        value: ${{ jobs.set-failure-mode.outputs.failure-mode }}

defaults:
  run:
    shell: bash

permissions:
  id-token: write
  actions: read
  pull-requests: write
  statuses: write
  checks: write
  contents: read

env:
  GRADLE_CACHE_USERNAME: ${{ secrets.gradle-cache-username }}
  GRADLE_CACHE_PASSWORD: ${{ secrets.gradle-cache-password }}
  GRADLE_EXEC: ionice -c 2 -n 2 nice -n 19 ./gradlew
  CG_EXEC: ionice -c 2 -n 2 nice -n 19
  STREAM_MODE_OVERRIDE: ${{ inputs.stream-mode-override }}
  WRITER_MODE_OVERRIDE: ${{ inputs.writer-mode-override }}
  WRAPPED_RECORD_BLOCKS_OVERRIDE: ${{ inputs.wrapped-record-blocks-override }}

jobs:
  hapi-tests-misc:
    name: "HAPI Tests (Misc)"
    if: ${{ inputs.enable-hapi-tests-misc == 'true' }}
    runs-on: hl-cn-hapi-lin-lg
    outputs:
      failure-mode: ${{ steps.set-failure-mode.outputs.failure-mode }}
    steps:
      - name: Prepare Runner
        uses: pandaswhocode/initialize-github-job@c392c3e699995ab6030915302d2fc9bffb1e861f # v1.1.0
        with:
          checkout: "true"
          checkout-ref: "${{ inputs.ref }}"
          checkout-fetch-depth: "1"
          checkout-token: "${{ secrets.access-token }}"
          setup-java: "true"
          java-version: "${{ inputs.java-version }}"
          java-distribution: "${{ inputs.java-distribution }}"
          setup-gradle: "true"
          setup-testlens: "true"
          gradle-cache-read-only: "false"
          setup-node: "true"
          node-version: "${{ inputs.node-version }}"

      - name: HAPI Testing (Misc)
        id: gradle-hapi-misc
        env:
          LC_ALL: en.UTF-8
          LANG: en_US.UTF-8
        # Run each task in isolation with clean builds because we dynamically reconfigure Log4j for each mode
        run: |
          status=0
          run_subtask() {
            local t=$1
            echo "::group::$t"
            if ${GRADLE_EXEC} "$t" --no-daemon; then
              echo "::endgroup::"
              return 0
            fi
            echo "::endgroup::"
            status=1
            echo "::error::$t failed"
            echo "❌ $t FAILED — expand group above for details"
          }
          run_subtask hapiTestMisc
          run_subtask hapiTestMiscEmbedded
          run_subtask hapiTestMiscRepeatable
          exit $status

      - name: YahCLI Subprocess Regression Tests
        id: gradle-yahcli-misc
        env:
          LC_ALL: en.UTF-8
          LANG: en_US.UTF-8
        run: ${GRADLE_EXEC} :yahcli:testSubprocess --no-daemon

      - name: Publish HAPI Test (Misc) Reports
        uses: step-security/publish-unit-test-result-action@7dff603bf17ef13dee847147bef8d7cd1728b566 # v2.22.0
        with:
          check_name: "Node: HAPI Test (Misc) Results"
          json_thousands_separator: ","
          junit_files: |
            **/test-clients/build/test-results/**/TEST-*.xml
            **/yahcli/build/test-results/**/TEST-*.xml
          comment_mode: errors # only comment if we could not find or parse the JUnit XML files

      - name: Upload HAPI Test (Misc) Report Artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: HAPI Test (Misc) Reports
          path: |
            **/test-clients/build/test-results/**/TEST-*.xml
            **/yahcli/build/test-results/**/TEST-*.xml
          retention-days: 7

      - name: Upload HAPI Test (Misc) Network Logs
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: ${{ !cancelled() && inputs.enable-network-log-capture && (steps.gradle-hapi-misc.conclusion == 'failure' || steps.gradle-yahcli-misc.conclusion == 'failure') }}
        with:
          name: HAPI Test (Misc) Network Logs
          path: |
            hedera-node/test-clients/build/*-test/**/output/**
            hedera-node/test-clients/build/*-test/*.log
            hedera-node/test-clients/output/**
            hedera-node/yahcli/build/hapi-test/**/output/**
            hedera-node/yahcli/build/hapi-test/**/*.log
          retention-days: 7

      - name: Upload HAPI Test (Misc) Failure Artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: ${{ !cancelled() && (steps.gradle-hapi-misc.conclusion == 'failure' || steps.gradle-yahcli-misc.conclusion == 'failure') }}
        with:
          name: HAPI Test (Misc) Failure Artifacts
          path: |
            hedera-node/test-clients/build/**/*.blk.gz
            hedera-node/test-clients/build/**/*.rcd.gz
            hedera-node/test-clients/build/**/*.pb
            hedera-node/test-clients/build/**/*.pces
            hedera-node/test-clients/build/*-test/**/output/**
            hedera-node/test-clients/build/*-test/**/*.log
            hedera-node/test-clients/output/**
            hedera-node/yahcli/build/reports/tests/testSubprocess/**
            hedera-node/yahcli/build/hapi-test/**/output/**
            hedera-node/yahcli/build/hapi-test/**/*.log
          retention-days: 7

      - name: Set Failure Mode Output
        id: set-failure-mode
        if: ${{ always() }}
        run: |
          if [[ "${{ steps.gradle-hapi-misc.outcome || 'skipped' }}" == "success" \
             || "${{ steps.gradle-hapi-misc.outcome || 'skipped' }}" == "skipped" ]]; then
            echo "failure-mode=none" >> "${GITHUB_OUTPUT}"
          elif [[ "${{ steps.gradle-hapi-misc.outcome || 'skipped' }}" == "failure" ]]; then
            echo "failure-mode=test" >> "${GITHUB_OUTPUT}"
          else
            echo "failure-mode=workflow" >> "${GITHUB_OUTPUT}"
          fi

  hapi-tests-misc-records-crypto-and-serial:
    name: "HAPI Tests (Misc Records, Crypto & Misc Serial)"
