      - name: Set Failure Mode Output
        id: set-failure-mode
        if: ${{ always() }}
        run: |
          if [[ "${{ steps.gradle-hapi-misc-records-crypto-and-serial.outcome || 'skipped' }}" == "success" \
             || "${{ steps.gradle-hapi-misc-records-crypto-and-serial.outcome || 'skipped' }}" == "skipped" ]]; then
